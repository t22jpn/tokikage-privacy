  const mkCic = (freq, Q, amRate) => {
    const src = audioCtx.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
    const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = Q;
    const g = audioCtx.createGain(); g.gain.value = 0;
    const am = audioCtx.createOscillator(); am.frequency.value = amRate;     // 速い震え
    const amG = audioCtx.createGain(); amG.gain.value = 0;
    const sw = audioCtx.createOscillator(); sw.frequency.value = .07 + Math.random()*.06;  // 群れが寄せては引く
    const swG = audioCtx.createGain(); swG.gain.value = 0;
    am.connect(amG); amG.connect(g.gain);
    sw.connect(swG); swG.connect(g.gain);
    src.connect(bp); bp.connect(g); g.connect(ambBus);
    src.start(); am.start(); sw.start();
    return {src, bp, g, am, amG, sw, swG};
  };
  const cicA = mkCic(5600, 1.2, 28);                     // アブラゼミの層
  const cicB = mkCic(4300, 2.2, 12);                     // 遠いミンミンの層
  const ins  = mkCic(4450, 8, 8.5);                      // 秋の夜の、遠い虫の合唱

function setStyle(style){
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const now = audioCtx.currentTime;
  if (schedTimer){ clearInterval(schedTimer); schedTimer = null; }
  if (crackleSrc){ try{ crackleSrc.stop(); }catch(e){} crackleSrc = null; }
  stopBed();
  stopAmbience();
  masterGain.gain.cancelScheduledValues(now);
  if (style === 'off'){
    masterGain.gain.setTargetAtTime(0, now, .3);
    setTimeout(() => { if (musicStyle === 'off' && audioCtx) audioCtx.suspend(); }, 1200);
  } else {
    masterGain.gain.setTargetAtTime(.6, now, .2);
    const start = now + .12;
    nextChord = start; nextPluck = start+.3; chordIdx = 0;
    nextMotif = start + 16 + Math.random()*14;               // 最初の「節」までは、少し間を置く
    nextStep = start; stepIdx = 0;
    nextBox = start+.3; nextBoxPad = start; boxPadIdx = 0;
    nextBoxMotif = start + 14 + Math.random()*12;
    if (style === 'lofi') startCrackle(); else startBed();
    startAmbience();
    updateAmbience();
    SCHED[style]();
    schedTimer = setInterval(SCHED[style], 150);
  }
  musicStyle = style;
  musicBtn.innerHTML = '<span>' + STYLE_LABEL[style] + '</span><span class="en">Music</span>';
  musicBtn.classList.toggle('on', style !== 'off');
  musicMenu.querySelectorAll('button').forEach(b => b.classList.toggle('sel', b.dataset.style === style));
  musicMenu.classList.remove('open');
}

/* ---------- カメラ ---------- */
const target = new THREE.Vector3(16, 14, 0);
let theta = .85, phi = 1.18, dist = 500;
const clampPhi = v => Math.max(.12, Math.min(1.52, v));
function applyCam(){
  camera.position.set(
    target.x + dist*Math.sin(phi)*Math.cos(theta),
    target.y + dist*Math.cos(phi),
    target.z + dist*Math.sin(phi)*Math.sin(theta)
  );
  camera.lookAt(target);
}
let anim = null;
function flyTo(t, th, ph, d, spd){
  anim = { t0:{x:target.x,y:target.y,z:target.z}, t1:t, th0:theta, th1:th, ph0:phi, ph1:ph, d0:dist, d1:d, k:0, spd:spd || 1.4 };
}
const ptrs = new Map();
let pinch0 = 0, dist0 = 0;
canvas.addEventListener('pointerdown', e => {
  musicMenu.classList.remove('open'); cityMenu.classList.remove('open');
  if (!audioCtx) setStyle('ambient');
  canvas.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY, b:e.button});
  if (ptrs.size===2){ const p=[...ptrs.values()]; pinch0=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); dist0=dist; }
});
canvas.addEventListener('pointermove', e => {
  if (!ptrs.has(e.pointerId)) return;
  const p = ptrs.get(e.pointerId);
  const dx = e.clientX - p.x, dy = e.clientY - p.y;
  if (ptrs.size === 1){
    if (p.b === 2){ pan(dx, dy); }
    else { theta += dx*.005; phi = clampPhi(phi - dy*.005); anim=null; }
  } else if (ptrs.size === 2){
    p.x = e.clientX; p.y = e.clientY;
    const q = [...ptrs.values()];
    const pinch = Math.hypot(q[0].x-q[1].x, q[0].y-q[1].y);
    if (pinch0 > 0) dist = Math.max(60, Math.min(700, dist0*pinch0/pinch));
    anim = null;
    return;
  }
  p.x = e.clientX; p.y = e.clientY;
});
const endPtr = e => { ptrs.delete(e.pointerId); pinch0 = 0; };
canvas.addEventListener('pointerup', endPtr);
canvas.addEventListener('pointercancel', endPtr);
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('wheel', e => { e.preventDefault(); dist = Math.max(60, Math.min(700, dist*(1+e.deltaY*.0012))); anim=null; }, {passive:false});
function pan(dx, dy){
  const right = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0);
  const up = new THREE.Vector3(0,1,0);
  target.addScaledVector(right, -dx*dist*.0012);
  target.addScaledVector(up, dy*dist*.0012);
  anim = null;
}
const viewsEl = document.getElementById('views');
function buildViewButtons(views){
  viewsEl.innerHTML = '';
  views.forEach(v => {
    const b = document.createElement('button');
    b.innerHTML = '<span class="bi"><span>' + v.name + '</span><span class="en">' + (v.nameEn||'') + '</span></span>';
    b.onclick = () => {
      flyTo(v.t, v.th, v.ph, v.d);
      viewsEl.querySelectorAll('button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
    };
    viewsEl.appendChild(b);
  });
}

function periodKey(){
  if (hour >= 21 || hour < 4.6) return 'night';
  if (hour < 6.0)  return 'yoakemae';
  if (hour < 7.6)  return 'yoake';
  if (hour < 10)   return 'asa';
  if (hour < 16.2) return 'hiru';
  if (hour < 17.8) return 'golden';
  if (hour < 19.1) return 'yuyake';
  if (hour < 20.2) return 'zanka';
  return 'yoi';
}

  do { line = pool[Math.floor(Math.random()*pool.length)]; }
  while (pool.length > 1 && line === lastLine);
  lastLine = line;

    subEl.innerHTML = en ? line.split(', ').join(',<br>') : line.split('、').join('、<br>');

function dataURLtoBlob(du){
  const parts = du.split(',');

const recBtn = document.getElementById('rec');
let recorder = null, recRAF = 0, recDest = null, recSubA = 0;
let recChunks = [], recMime = '', recFinalized = true;
function pickRecMime(){
  const c = ['video/mp4;codecs=avc1', 'video/mp4', 'video/webm;codecs=vp9', 'video/webm'];
  for (const m of c){ if (MediaRecorder.isTypeSupported(m)) return m; }
  return '';
}
function cleanupRecUI(){
  cancelAnimationFrame(recRAF);
  if (recDest){ try{ masterGain.disconnect(recDest); }catch(e){} recDest = null; }
  document.body.classList.remove('recording');
  recBtn.classList.remove('on');
  recBtn.querySelector('span').textContent = '🎬 録画';
}
function startRec(){
  if (!window.MediaRecorder || !canvas.captureStream){
    alert('この端末は録画に対応していません。コントロールセンターの画面収録をお使いください');
    return;
  }
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // 合成キャンバスに映像と字幕だけを焼き込む ── UIは一切映らない
  const W = Math.min(canvas.width, 1280);
  const H = Math.round(canvas.height * W / canvas.width);
  const rc = document.createElement('canvas'); rc.width = W; rc.height = H;
  const g2 = rc.getContext('2d');
  const stream = rc.captureStream(30);
  recDest = audioCtx.createMediaStreamDestination();
  masterGain.connect(recDest);
  recDest.stream.getAudioTracks().forEach(tr => stream.addTrack(tr));
  const mime = pickRecMime();
  try { recorder = new MediaRecorder(stream, mime ? {mimeType:mime, videoBitsPerSecond:6000000} : undefined); }
  catch(e){
    try { recorder = new MediaRecorder(stream); }
    catch(e2){ cleanupRecUI(); alert('この端末は録画に対応していません'); recorder = null; return; }
  }
  recChunks = [];
  recMime = recorder.mimeType || mime || 'video/webm';
  recorder.ondataavailable = e => { if (e.data && e.data.size) recChunks.push(e.data); };
  recorder.onerror = () => stopRec();
  recSubA = 0;
  const u = Math.min(W, H) / 720;
  const draw = () => {
    g2.drawImage(canvas, 0, 0, W, H);
    const showing = subLang !== 'off' && subEl.classList.contains('show');
    recSubA += ((showing ? 1 : 0) - recSubA) * .05;
    if (recSubA > .02){
      const lines = subEl.innerHTML.split(/<br\s*\/?>/i).map(s => s.replace(/<[^>]*>/g, '').trim()).filter(Boolean);
      g2.save();
      g2.globalAlpha = recSubA * .95;
      g2.shadowColor = 'rgba(0,0,0,.7)'; g2.shadowBlur = 9*u;
      g2.fillStyle = '#f2f5f9';
      g2.font = '600 ' + (21*u) + 'px "Shippori Mincho", serif';
      lines.slice(0, 2).forEach((ln, i) => g2.fillText(ln, 30*u, H - (58 - i*30)*u));
      g2.restore();
    }
    recRAF = requestAnimationFrame(draw);
  };
  draw();
  recorder.start();   // タイムスライスなし ── Safariの停止不能バグを避ける
  document.body.classList.add('recording');
  recBtn.classList.add('on');
  recBtn.querySelector('span').textContent = '⏺ 停止';
}
function stopRec(){
  const r = recorder;
  recorder = null;
  cleanupRecUI();
  if (!r) return;
  recFinalized = false;
  const finalize = () => {
    if (recFinalized) return;
    recFinalized = true;
    if (!recChunks.length){
      alert('録画データを取り出せませんでした。コントロールセンターの画面収録をお使いください');
      return;
    }
    const type = recMime, ext = type.includes('mp4') ? 'mp4' : 'webm';
    const d = new Date(), p = n => String(n).padStart(2,'0');
    showShareView(new Blob(recChunks, {type}),
      `tokikage_${city}_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}.${ext}`, true);
  };
  r.onstop = finalize;
  try { if (r.state !== 'inactive') r.stop(); } catch(e){}
  let tries = 0;
  const poll = setInterval(() => {
    if (recFinalized){ clearInterval(poll); return; }
    if (recChunks.length || r.state === 'inactive' || ++tries > 12){ clearInterval(poll); finalize(); }
  }, 500);
}

const CITY_LATLON = {
  sapporo:[43.06, 141.35], tokyo:[35.68, 139.65], kyoto:[35.01, 135.77],
  osaka:[34.69, 135.50], fukuoka:[33.59, 130.40], naha:[26.21, 127.68],
};
function nearestCity(lat, lon){
  const R = 6371, toRad = d => d*Math.PI/180;
  let best = 'sapporo', bestD = Infinity;
  for (const c in CITY_LATLON){
    const [clat, clon] = CITY_LATLON[c];
    const dLat = toRad(clat-lat), dLon = toRad(clon-lon);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat))*Math.cos(toRad(clat))*Math.sin(dLon/2)**2;
    const d = R * 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    if (d < bestD){ bestD = d; best = c; }
  }
  return best;
}

const clock3 = new THREE.Clock();

function loop(){
  requestAnimationFrame(loop);

  perf += dt;
  if (flowOn) hour = (hour + dt*24/DAY_SECONDS) % 24;
  applyTime();
  {
    const nt = nightness();
    // 夜だけブルームを起こす。ON/OFFにヒステリシスを持たせ、境界でのちらつきを防ぐ
    bloomOn = bloomOn ? (nt > .008) : (nt > .02);
    bloom.comp.uniforms.strength.value = Math.min(1, nt*4) * (.32 + nt*.33);
    bloom.bright.uniforms.threshold.value = .92 - nt*.08;
    // 引いて眺めるほどミニチュアらしく、近づくとほぼ素通し ── 近景で塔の庇が帯ボケでうねらないように
    const dk = Math.max(0, Math.min(1, (dist - 140) / 560));
    bloom.comp.uniforms.tiltAmt.value = .15 + .85*dk*dk;
    bloom.comp.uniforms.focusDist.value = dist;              // ピントは常に、見つめている中心へ
    // グレインは静かに揺れ、ハイライトの琥珀は朝夕に深まる
    bloom.comp.uniforms.tGrain.value = perf % 97;
    bloom.comp.uniforms.warm.value = Math.max(0, Math.min(1, (skyUni.glowStrength.value - .35) / .95));

    anim.k = Math.min(1, anim.k + dt*anim.spd);
    const e = 1 - Math.pow(1-anim.k, 3);
    target.set(
      anim.t0.x + (anim.t1.x-anim.t0.x)*e,
      anim.t0.y + (anim.t1.y-anim.t0.y)*e,
      anim.t0.z + (anim.t1.z-anim.t0.z)*e
    );
    theta = anim.th0 + (anim.th1-anim.th0)*e;
    phi = anim.ph0 + (anim.ph1-anim.ph0)*e;

    if (cfg.sys === 'points'){
      const arr = pArr, n = cfg.count;
      if (cfg.mode === 'snow'){
        for (let i = 0; i < n; i++){
          arr[i*3+1] -= dt*(14+(i%7)*3);
          arr[i*3] += Math.sin((i+perf)*.6)*dt*3;
          if (arr[i*3+1] < 0) arr[i*3+1] = 260;
        }
      } else if (cfg.mode === 'fluff'){
        for (let i = 0; i < n; i++){
          arr[i*3] += dt*(5+(i%4)*1.6);
          arr[i*3+1] += Math.sin(perf*.7+i*1.3)*dt*4 - dt*1.1;
          arr[i*3+2] += Math.cos(perf*.4+i)*dt*2.5;
          if (arr[i*3] > 330) arr[i*3] = -330;
          if (arr[i*3+1] < 3) arr[i*3+1] = 15+Math.random()*110;
          if (arr[i*3+1] > 155) arr[i*3+1] = 155;
        }
      } else if (cfg.mode === 'yukimushi'){
        // 群れの中心がゆっくり漂い、一匹一匹はその周りをふわふわ回る
        for (const c of yukiCenters){
          c.x += Math.sin(perf*.13 + c.ph)*dt*6;
          c.z += Math.cos(perf*.11 + c.ph*1.7)*dt*6;
          c.y = 8 + Math.sin(perf*.2 + c.ph)*5;
          if (c.x > 300) c.x = 300; if (c.x < -300) c.x = -300;
          if (c.z > 300) c.z = 300; if (c.z < -300) c.z = -300;
        }
        for (let i = 0; i < n; i++){
          const c = yukiCenters[i % 12];
          const r = 4 + (i*7 % 11);
          const a = perf*(.5 + (i%5)*.18) + i*.8;
          arr[i*3]   = c.x + Math.cos(a)*r + Math.sin(perf*3.1 + i*1.7)*1.2;   // 羽ばたきの細かな震え
          arr[i*3+1] = c.y + Math.sin(perf*.9 + i*.63)*3;
          arr[i*3+2] = c.z + Math.sin(a*1.19 + i)*r + Math.cos(perf*2.6 + i)*1.2;
        }
      }
      partGeo.attributes.position.needsUpdate = true;
    } else if (cfg.sys === 'cards'){
      const n = cfg.count;
      const mode = cfg.mode;
      for (let i = 0; i < n; i++){
        if (mode === 'leaf'){
          cardPos[i*3+1] -= dt*(5+(i%6)*1.6);
          cardPos[i*3] += Math.sin(perf*1.2+i*.9)*dt*12;
          cardPos[i*3+2] += Math.cos(perf*.9+i*.6)*dt*6;
          if (cardPos[i*3+1] < 0){ cardPos[i*3+1] = 180+Math.random()*20; cardPos[i*3] = (Math.random()-.5)*640; }
        } else if (mode === 'fluff'){
          cardPos[i*3] += dt*(6+(i%5)*1.5);                          // 街を渡る風に乗って
          cardPos[i*3+1] += Math.sin(perf*.6+i*1.3)*dt*5 - dt*.7;    // 浮いては沈み
          cardPos[i*3+2] += Math.cos(perf*.35+i*.8)*dt*3;
          if (cardPos[i*3] > 330) cardPos[i*3] = -330;
          if (cardPos[i*3+1] < 3) cardPos[i*3+1] = 12+Math.random()*90;
          if (cardPos[i*3+1] > 145) cardPos[i*3+1] = 145;
        } else {
          cardPos[i*3+1] -= dt*(8+(i%5)*2.2);
          cardPos[i*3] += Math.sin(perf*1.8+i)*dt*9;
          cardPos[i*3+2] += Math.cos(perf*1.3+i*.7)*dt*4;
          if (cardPos[i*3+1] < 0){ cardPos[i*3+1] = 200+Math.random()*20; cardPos[i*3] = (Math.random()-.5)*640; }
        }
        cardRot[i*3] += cardRotV[i*3]*dt;
        cardRot[i*3+1] += cardRotV[i*3+1]*dt;
        cardRot[i*3+2] += cardRotV[i*3+2]*dt;
        dummy.position.set(cardPos[i*3], cardPos[i*3+1], cardPos[i*3+2]);
        dummy.rotation.set(cardRot[i*3], cardRot[i*3+1], cardRot[i*3+2]);
        dummy.scale.setScalar(cardScl[i]);
        dummy.updateMatrix();
        cardSys.setMatrixAt(i, dummy.matrix);
      }
      cardSys.instanceMatrix.needsUpdate = true;
      cardMat.color.copy(cardBase).multiplyScalar(1 - nt2*.55);   // 夜は色が沈む
    } else if (cfg.sys === 'rain'){
      const n = cfg.count;
      for (let i = 0; i < n; i++){
        rArr[i*6+1] -= dt*rainSpd[i];
        rArr[i*6] -= dt*26;
        if (rArr[i*6+1] < 0){ rArr[i*6+1] = 240+Math.random()*20; rArr[i*6] = (Math.random()-.5)*640; }
        if (rArr[i*6] < -330) rArr[i*6] = 330;
        // 雨脚の下端＝進行方向に伸びる線
        const len = 4.5 + rainSpd[i]*.012;
        rArr[i*6+3] = rArr[i*6] - 26/rainSpd[i]*len*8;
        rArr[i*6+4] = rArr[i*6+1] - len;
        rArr[i*6+5] = rArr[i*6+2];
      }
      rainGeo.attributes.position.needsUpdate = true;
    } else if (cfg.sys === 'fire'){
      const nightOnly = Math.pow(Math.max(0, (nt2 - .58) / .42), 1.4);
      if (nightOnly > .002){                              // 夜になってから、初めて飛び始める
        const K = 1.6;
        const R2 = 34*34;
        for (let i = 0; i < FIRE_N; i++){
          let sumSin = 0, nNear = 0;
          const xi = fArr[i*3], yi = fArr[i*3+1], zi = fArr[i*3+2];
          for (let j = 0; j < FIRE_N; j++){
            if (j === i) continue;
            const dx = fArr[j*3]-xi, dy = fArr[j*3+1]-yi, dz = fArr[j*3+2]-zi;
            if (dx*dx+dy*dy+dz*dz > R2) continue;
            sumSin += Math.sin(fTheta[j]-fTheta[i]);
            nNear++;
          }
          const coupling = nNear > 0 ? (K/nNear)*sumSin : 0;
          fTheta[i] += (fOmega[i] + coupling) * dt;
          fArr[i*3]   += Math.sin(perf*1.1+i*2.1)*dt*7;
          fArr[i*3+1] += Math.cos(perf*.9+i*1.3)*dt*3;
          fArr[i*3+2] += Math.sin(perf*.7+i*.8)*dt*7;
          if (fArr[i*3+1] < 2) fArr[i*3+1] = 2;
          if (fArr[i*3+1] > 28) fArr[i*3+1] = 28;
          const b = Math.pow(Math.max(0, Math.sin(fTheta[i])), 3) * fAmp[i] * Math.min(1, nightOnly);
          fCol[i*3] = .8*b; fCol[i*3+1] = .95*b; fCol[i*3+2] = .42*b;
        }
      } else {                                            // 昼間は、じっと止まって眠っている
        for (let i = 0; i < FIRE_N; i++){
          fCol[i*3] = 0; fCol[i*3+1] = 0; fCol[i*3+2] = 0;
        }
      }
      fireGeo.attributes.position.needsUpdate = true;
      fireGeo.attributes.color.needsUpdate = true;
    }
  }
  updateBirds(dt);
  {
    const ntM = nightness();
    if (ntM > .85 && Math.random() < dt*.03) spawnMeteor();  // 深い夜、およそ数十秒にひとつ
    updateMeteors(dt, ntM);
    updateRare(dt);
  }
  applyCam();
  renderScene();
}
loop();
})();
</script>
