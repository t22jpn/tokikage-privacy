<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>刻景 ─ 日本六都市の時間標本</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1d2733; --paper:#f5f7f8; --accent:#c73e3a; --pine:#2e5e4e; --mist:rgba(245,247,248,.86);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;font-family:'Zen Kaku Gothic New',sans-serif;color:var(--ink)}
  #scene{position:fixed;inset:0;touch-action:none}
  .plate{
    position:fixed;top:14px;left:14px;z-index:5;
    background:var(--mist);backdrop-filter:blur(8px);
    border:1px solid rgba(29,39,51,.12);border-left:4px solid var(--accent);
    padding:10px 16px 11px;border-radius:4px;pointer-events:none;
  }
  .plate h1{font-family:'Shippori Mincho',serif;font-weight:800;font-size:19px;letter-spacing:.14em;line-height:1.2}
  .plate .en-title{display:block;font-family:'Zen Kaku Gothic New',sans-serif;font-size:8.5px;font-weight:600;
    letter-spacing:.32em;color:var(--accent);opacity:.75;margin-top:2px;text-transform:uppercase}
  .plate p{font-size:10.5px;letter-spacing:.22em;color:#5b6b7a;margin-top:3px}
  /* バイリンガル表示 ── 日本語の下に、小さく静かな英語を添える */
  .bi{display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.15}
  .bi .en{font-family:'Zen Kaku Gothic New',sans-serif;font-size:8px;font-weight:600;
    letter-spacing:.1em;opacity:.55;text-transform:uppercase}
  .pmenu button .en{font-size:9px;letter-spacing:.08em;opacity:.55;text-transform:uppercase;margin-top:2px}
  .timebox{
    position:fixed;top:14px;right:14px;z-index:5;
    background:var(--mist);backdrop-filter:blur(8px);
    border:1px solid rgba(29,39,51,.12);border-radius:4px;
    padding:9px 13px 11px;display:flex;flex-direction:column;gap:6px;align-items:center;
  }
  .timebox .clockrow{display:flex;align-items:center;gap:9px}
  #clock{font-family:'Shippori Mincho',serif;font-weight:800;font-size:21px;letter-spacing:.08em;font-variant-numeric:tabular-nums;min-width:74px;text-align:center}
  #flow{font-size:12px;width:30px;height:30px;border-radius:50%;cursor:pointer;border:1px solid rgba(29,39,51,.2);background:transparent;color:var(--ink)}
  #hourSlider{width:160px;accent-color:var(--accent)}
  .views{
    position:fixed;left:14px;top:50%;transform:translateY(-50%);z-index:5;
    display:flex;flex-direction:column;gap:8px;
  }
  .views button{
    font-family:'Shippori Mincho',serif;font-weight:600;
    font-size:12px;letter-spacing:.16em;padding:8px 4px;
    background:var(--mist);backdrop-filter:blur(8px);color:var(--ink);
    border:1px solid rgba(29,39,51,.15);border-radius:3px;cursor:pointer;transition:all .18s;
  }
  .views button .bi{writing-mode:horizontal-tb;display:flex;flex-direction:row-reverse;align-items:stretch;gap:2px}
  .views button .bi > span:first-child{writing-mode:vertical-rl}
  .views button .en{writing-mode:vertical-rl;font-family:'Zen Kaku Gothic New',sans-serif;
    font-size:7px;letter-spacing:.04em;opacity:.5;font-weight:600;margin:0;
    border-left:1px solid rgba(29,39,51,.15);padding-left:2px}
  .views button.on .en{border-left-color:rgba(255,255,255,.25)}
  .views button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .bar{
    position:fixed;left:0;right:0;bottom:0;z-index:5;
    display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;
    padding:10px 10px calc(12px + env(safe-area-inset-bottom));
  }
  .bar button{
    font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:12.5px;letter-spacing:.06em;
    padding:8px 13px;border-radius:999px;cursor:pointer;border:1px solid rgba(29,39,51,.18);
    background:var(--mist);backdrop-filter:blur(8px);color:var(--ink);transition:all .18s;
    display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.1;
  }
  .bar button .en{font-family:'Zen Kaku Gothic New',sans-serif;font-size:8px;font-weight:600;
    letter-spacing:.09em;opacity:.55;text-transform:uppercase}
  #music.on .en, #spin.on .en, #subs.on .en{opacity:.75}
  #shot .en{color:rgba(255,255,255,.8)}
  #cityBtn .en{color:rgba(255,255,255,.7)}
  .bar button:active{transform:scale(.96)}
  #shot{background:var(--accent);border-color:var(--accent);color:#fff;padding:10px 20px}
  #spin.on{background:var(--pine);color:#fff;border-color:var(--pine)}
  #music.on{background:#7a5aa8;color:#fff;border-color:#7a5aa8}
  #subs.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  #cityBtn{background:#3a5a7a;border-color:#3a5a7a;color:#fff}
  .pmenu{
    position:fixed;left:50%;bottom:calc(66px + env(safe-area-inset-bottom));
    transform:translateX(-50%);z-index:7;display:none;flex-direction:column;gap:6px;
    background:var(--mist);backdrop-filter:blur(10px);
    border:1px solid rgba(29,39,51,.15);border-radius:12px;padding:9px;
    box-shadow:0 8px 28px rgba(10,20,30,.25);max-height:60vh;overflow-y:auto;
  }
  .pmenu.open{display:flex}
  .pmenu button{
    font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;
    padding:9px 24px;border-radius:8px;border:1px solid transparent;cursor:pointer;
    background:transparent;color:var(--ink);text-align:left;
    display:flex;flex-direction:column;gap:1px;
  }
  .pmenu button .en{display:block;font-size:9px;font-weight:600;letter-spacing:.1em;
    opacity:.5;text-transform:uppercase}
  .pmenu button.sel{background:var(--ink);color:var(--paper)}
  .pmenu button.sel .en{opacity:.7}
  #subtitle.rare{
    color:#e6e0c4;                                        /* 生成りがかった月の色 ── 赤みゼロ。色ではなく、佇まいで気づかせる */
    text-shadow:0 0 18px rgba(230,224,196,.25), 0 1px 3px rgba(0,0,0,.6);
    letter-spacing:.2em;
  }
  #subtitle{
    position:fixed;left:50%;bottom:calc(150px + env(safe-area-inset-bottom));
    transform:translateX(-50%);z-index:4;pointer-events:none;
    max-width:86vw;text-align:center;
    font-family:'Shippori Mincho',serif;font-weight:600;
    font-size:17px;letter-spacing:.2em;line-height:2;color:#fff;
    text-shadow:0 1px 10px rgba(0,0,0,.6), 0 0 3px rgba(0,0,0,.75);
    opacity:0;transition:opacity 1.9s ease;
  }
  #subtitle.show{opacity:1}
  @media (max-width:520px){
    .plate h1{font-size:15px}
    .plate p{font-size:9px}
    .views button{font-size:11.5px;padding:9px 6px}
    #clock{font-size:18px;min-width:62px}
    #hourSlider{width:120px}
    #subtitle{font-size:14px;letter-spacing:.14em;bottom:calc(170px + env(safe-area-inset-bottom))}
    .bar button{font-size:11.5px;padding:9px 11px}
  }
  .plate .sekki{font-size:8.5px;letter-spacing:.18em;color:var(--accent);opacity:.85;margin-top:4px;font-weight:700}
  /* UIの表示切替 ── 右下の磨りガラスのスクワークル。隠すとバーの跡へ滑り降り、気配だけになる */
  #uiToggle{
    position:fixed; right:14px; bottom:calc(env(safe-area-inset-bottom, 0px) + 70px); z-index:7;   /* bottomはJSが実測で上書きする */
    width:40px; height:40px; border-radius:13px; cursor:pointer; padding:0;
    background:var(--mist); backdrop-filter:blur(10px);
    border:1px solid rgba(29,39,51,.16); color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 18px rgba(8,14,24,.16);
    transition:bottom .55s cubic-bezier(.4,0,.2,1), opacity .5s, background .4s, color .4s, border-color .4s, transform .25s;
  }
  #uiToggle svg{transition:transform .4s cubic-bezier(.4,0,.2,1)}
  #uiToggle:active{transform:scale(.9)}
  body.uihidden .plate, body.uihidden .timebox, body.uihidden .views,
  body.uihidden .pmenu, body.uihidden .bar{
    opacity:0; pointer-events:none; transition:opacity .5s;
  }
  body.uihidden #uiToggle{
    opacity:.34; background:rgba(10,16,26,.32); color:#dfe7f0;
    border-color:rgba(226,236,246,.16); box-shadow:none;
  }
  body.uihidden #uiToggle svg{transform:scale(.72)}
  body.recording #uiToggle{opacity:0; pointer-events:none}
  /* 録画中 ── 画面からも余計なものを消し、止めるボタンだけを残す */
  body.recording .plate, body.recording .timebox, body.recording .views,
  body.recording .pmenu, body.recording .bar button:not(#rec){
    opacity:0; pointer-events:none; transition:opacity .5s;
  }
  #rec.on{color:#ff6b5e; border-color:rgba(255,107,94,.55)}
  #rec.on span:first-child{animation:recPulse 1.6s ease infinite}
  @keyframes recPulse{0%,100%{opacity:1}50%{opacity:.35}}
  /* 共有ビュー ── 撮ったものを確かめて、SNSへ送り出す */
  #shareView{position:fixed; inset:0; z-index:28; background:rgba(4,6,13,.94);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:18px}
  #shareView img, #shareView video{max-width:92vw; max-height:54vh; border-radius:10px; display:block; background:#000;
    -webkit-touch-callout:default; -webkit-user-select:auto; user-select:auto}
  #shareView .svCap{max-width:86vw; font-family:'Shippori Mincho',serif; font-size:12px; color:#c3cdda;
    line-height:1.95; letter-spacing:.1em; text-align:center}
  #shareView .svTop{max-width:86vw; text-align:center; font-size:10.5px; color:#9fb0c4;
    background:rgba(10,16,26,.86); border:1px solid rgba(160,180,205,.24); border-radius:11px;
    padding:8px 14px; line-height:1.7; letter-spacing:.05em}
  #shareView .svRow{display:flex; gap:8px; flex-wrap:wrap; justify-content:center}
  #shareView .svRow button, #shareView .svRow .svBtn{
    font-family:inherit; font-size:12px; letter-spacing:.12em; color:#dfe7f0; text-decoration:none;
    background:rgba(140,165,195,.16); border:1px solid rgba(160,180,205,.32); border-radius:9px;
    padding:9px 18px; cursor:pointer; display:inline-block}
  #shareView #svShare{color:#0b1018; background:var(--accent); border-color:var(--accent); font-weight:700}
  /* 開幕 ── 暗がりの中に、題字と今日の名前が浮かぶ */
  #intro{
    position:fixed;inset:0;z-index:20;background:#04060d;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    transition:opacity 2.4s ease;
  }
  #intro.hide{opacity:0;pointer-events:none}
  #intro .ittl{
    font-family:'Shippori Mincho',serif;font-weight:800;font-size:46px;
    letter-spacing:.5em;text-indent:.5em;color:#e8ecf2;text-align:center;
    opacity:0;animation:introIn 3.4s ease .4s forwards;
  }
  #intro .ittlEn{display:block;font-family:'Zen Kaku Gothic New',sans-serif;font-size:9px;font-weight:600;
    letter-spacing:.6em;text-indent:.6em;color:var(--accent);opacity:.8;margin-top:10px}
  #intro .isub{font-size:11px;letter-spacing:.3em;color:#8fa0b4;opacity:0;animation:introIn 3.4s ease 1.4s forwards}
  #intro .ipoem{font-family:'Shippori Mincho',serif;font-size:14px;letter-spacing:.26em;color:#b6c1d0;
    opacity:0;animation:introIn 3.8s ease 2.2s forwards}
  #intro .itap{margin-top:30px;font-size:10px;letter-spacing:.34em;color:#7c8ca0;text-align:center;
    opacity:0;animation:introPulse 3.4s ease 3.4s infinite}
  #intro .itapEn{display:block;font-size:7.5px;letter-spacing:.3em;opacity:.6;margin-top:5px}
  @keyframes introIn{to{opacity:1}}
  @keyframes introPulse{0%,100%{opacity:.25}50%{opacity:.9}}
  @media (prefers-reduced-motion:reduce){ .bar button,.views button{transition:none} }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div style="position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at center, transparent 52%, rgba(8,14,26,.34) 100%)"></div>

<div class="plate">
  <h1>刻　景<span class="en-title">Tokikage</span></h1>
  <p id="citySub">札幌&nbsp;/&nbsp;SAPPORO&nbsp;/&nbsp;北緯43度</p>
  <p class="sekki" id="sekki"></p>
  <p id="buildTag" style="font-size:7.5px;letter-spacing:.2em;color:#9aa7b5;opacity:.55;margin-top:3px">build 0719-E</p>
</div>

<button id="uiToggle" title="ボタン表示の切り替え / Toggle UI" aria-label="Toggle UI"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 5V3.5A1.5 1.5 0 0 1 3.5 2H5"/><path d="M11 2h1.5A1.5 1.5 0 0 1 14 3.5V5"/><path d="M14 11v1.5a1.5 1.5 0 0 1-1.5 1.5H11"/><path d="M5 14H3.5A1.5 1.5 0 0 1 2 12.5V11"/></svg></button>

<div id="intro">
  <div class="ittl">刻　景<span class="ittlEn">TOKIKAGE</span></div>
  <div class="isub" id="introDate"></div>
  <div class="ipoem" id="introPoem"></div>
  <div class="itap">ふれて、時間をひらく<span class="itapEn">TOUCH TO BEGIN</span></div>
</div>

<div class="timebox">
  <div class="clockrow">
    <span id="clock">12:00</span>
    <button id="flow" title="時間の流れを止める">⏸</button>
  </div>
  <input type="range" id="hourSlider" min="0" max="24" step="0.05" value="12">
</div>

<div class="views" id="views"></div>
<div id="subtitle"></div>

<div class="pmenu" id="musicMenu">
  <button data-style="off"><span>オフ</span><span class="en">Off</span></button>
  <button data-style="amb"><span>環境音のみ</span><span class="en">Ambience Only</span></button>
  <button data-style="ambient" class="sel"><span>アンビエント</span><span class="en">Ambient</span></button>
  <button data-style="lofi"><span>Lo-fi Hip-Hop</span><span class="en">Lo-fi Beats</span></button>
  <button data-style="box"><span>オルゴール</span><span class="en">Music Box</span></button>
</div>
<div class="pmenu" id="cityMenu"></div>

<div class="bar">
  <button id="cityBtn"><span>都市：札幌</span><span class="en">City</span></button>
  <button id="season"><span>季節：夏</span><span class="en">Season</span></button>
  <button id="music" class="on"><span>♪ アンビエント</span><span class="en">Music</span></button>
  <button id="subs" class="on"><span>字幕</span><span class="en">Subtitles</span></button>
  <button id="spin"><span>回転</span><span class="en">Rotate</span></button>
  <button id="shot"><span>📷 撮影</span><span class="en">Photo</span></button>
  <button id="rec"><span>🎬 シネマ</span><span class="en">Cinema</span></button>
</div>
<div class="flash" id="flash" style="position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:9;transition:opacity .1s"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));   // 本編RTを1.35倍で超解像するぶん、画素比を再配分（総負荷は中立）
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
renderer.outputEncoding = THREE.sRGBEncoding;

function softDot(){
  const cv = document.createElement('canvas'); cv.width = cv.height = 64;
  const g = cv.getContext('2d');
  const gr = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  gr.addColorStop(0, 'rgba(255,255,255,1)');
  gr.addColorStop(.45, 'rgba(255,255,255,.55)');
  gr.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = gr; g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(cv);
}
const dotTex = softDot();

/* ==========================================================
   ブルーム（発光の滲み）── EffectComposer無しの軽量パイプライン
   本編を高解像度で描き、明部だけ抽出→ぼかし→加算合成する
========================================================== */
const bloom = (() => {
  const full = new THREE.WebGLRenderTarget(1, 1, {minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter});
  full.depthTexture = new THREE.DepthTexture();              // 奥行きベースの被写界深度のために深度を取る
  // 重要：本編パスにも画面直描きと同じsRGB変換を掛ける。
  // これが無いとブルームON/OFFの瞬間に画面全体の明るさが段差になる（夕暮れ・夜明けのたびにポンと変わる）
  full.texture.encoding = THREE.sRGBEncoding;
  const rtA = new THREE.WebGLRenderTarget(1, 1, {minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter});
  const rtB = new THREE.WebGLRenderTarget(1, 1, {minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter});
  // チルトシフト用のぼかし面（1/3解像度 ── 低解像度そのものが、とろけたボケ味になる）
  const rtTa = new THREE.WebGLRenderTarget(1, 1, {minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter});
  const rtTb = new THREE.WebGLRenderTarget(1, 1, {minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter});
  const quadScene = new THREE.Scene();
  const quadCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const geo = new THREE.PlaneGeometry(2, 2);
  const bright = new THREE.ShaderMaterial({
    uniforms:{tDiffuse:{value:null}, threshold:{value:.80}, soft:{value:.20}},
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.,1.); }`,
    fragmentShader:`
      varying vec2 vUv; uniform sampler2D tDiffuse; uniform float threshold, soft;
      void main(){
        vec3 c = texture2D(tDiffuse, vUv).rgb;
        float l = dot(c, vec3(.2126,.7152,.0722));
        // しきい値を超えた分だけを、明るさに応じて滑らかに抽出（縁のにじみを出さない）
        float k = smoothstep(threshold, threshold+soft, l);
        float over = clamp(l - threshold, 0., .5);
        gl_FragColor = vec4(c*k*over*2.2, 1.);
      }`
  });
  const blur = new THREE.ShaderMaterial({
    uniforms:{tDiffuse:{value:null}, dir:{value:new THREE.Vector2(1,0)}, res:{value:new THREE.Vector2(1,1)}},
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.,1.); }`,
    fragmentShader:`
      varying vec2 vUv; uniform sampler2D tDiffuse; uniform vec2 dir, res;
      void main(){
        vec2 px = dir/res;
        vec4 s = texture2D(tDiffuse, vUv)*.1964;
        s += texture2D(tDiffuse, vUv + px*1.411)*.2969;
        s += texture2D(tDiffuse, vUv - px*1.411)*.2969;
        s += texture2D(tDiffuse, vUv + px*3.294)*.0944;
        s += texture2D(tDiffuse, vUv - px*3.294)*.0944;
        s += texture2D(tDiffuse, vUv + px*5.176)*.0106;
        s += texture2D(tDiffuse, vUv - px*5.176)*.0106;
        gl_FragColor = s;
      }`
  });
  const comp = new THREE.ShaderMaterial({
    uniforms:{tBase:{value:null}, tBloom:{value:null}, tSoft:{value:null}, tDepth:{value:null},
              strength:{value:.7}, focusY:{value:.46}, tiltAmt:{value:1.0},
              sat:{value:1.1}, vig:{value:.26},
              camNear:{value:4}, camFar:{value:2600}, focusDist:{value:420}, dofAmt:{value:1.0},
              res:{value:new THREE.Vector2(1,1)}, tGrain:{value:0}, warm:{value:0}},
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.,1.); }`,
    fragmentShader:`
      varying vec2 vUv;
      uniform sampler2D tBase, tBloom, tSoft, tDepth;
      uniform float strength, focusY, tiltAmt, sat, vig, tGrain, warm;
      uniform float camNear, camFar, focusDist, dofAmt;
      uniform vec2 res;
      float luma(vec3 c){ return dot(c, vec3(.2126,.7152,.0722)); }
      float lumaF(vec3 c){ return dot(c, vec3(.299,.587,.114)); }
      vec3 fxaa(vec2 uv, vec2 px){
        /* 本物のFXAA 3.11 ── 細い庇の輪郭が這う「ぐにゃぐにゃ」を殺す */
        vec3 rgbNW = texture2D(tBase, uv + vec2(-1.,-1.)*px).rgb;
        vec3 rgbNE = texture2D(tBase, uv + vec2( 1.,-1.)*px).rgb;
        vec3 rgbSW = texture2D(tBase, uv + vec2(-1., 1.)*px).rgb;
        vec3 rgbSE = texture2D(tBase, uv + vec2( 1., 1.)*px).rgb;
        vec3 rgbM  = texture2D(tBase, uv).rgb;
        float lNW = lumaF(rgbNW), lNE = lumaF(rgbNE);
        float lSW = lumaF(rgbSW), lSE = lumaF(rgbSE), lM = lumaF(rgbM);
        float lMin = min(lM, min(min(lNW, lNE), min(lSW, lSE)));
        float lMax = max(lM, max(max(lNW, lNE), max(lSW, lSE)));
        vec2 dir = vec2(-((lNW + lNE) - (lSW + lSE)), ((lNW + lSW) - (lNE + lSE)));
        float dirReduce = max((lNW + lNE + lSW + lSE) * .03125, 1.0/128.0);
        float rcpDirMin = 1.0 / (min(abs(dir.x), abs(dir.y)) + dirReduce);
        dir = clamp(dir * rcpDirMin, vec2(-8.), vec2(8.)) * px;
        vec3 rgbA = .5 * (texture2D(tBase, uv + dir*(1.0/3.0 - .5)).rgb
                        + texture2D(tBase, uv + dir*(2.0/3.0 - .5)).rgb);
        vec3 rgbB = rgbA*.5 + .25*(texture2D(tBase, uv + dir*-.5).rgb
                                 + texture2D(tBase, uv + dir*.5).rgb);
        float lB = lumaF(rgbB);
        return (lB < lMin || lB > lMax) ? rgbA : rgbB;
      }
      float viewDist(vec2 uv){
        float d = texture2D(tDepth, uv).x;
        return (camNear * camFar) / (camFar - d * (camFar - camNear));   // 深度→視点からの距離
      }
      void main(){
        vec2 px = 1.0 / res;
        vec3 sharp = fxaa(vUv, px);
        /* --- ピント帯の外はとろけたボケ（周辺ほど淡い色収差 ── トイレンズの縁のにじみ） --- */
        vec2 q = vUv - .5;
        float rr = dot(q,q);
        vec2 ca = q * rr * .012;
        vec3 soft;
        soft.r = texture2D(tSoft, vUv + ca).r;
        soft.g = texture2D(tSoft, vUv).g;
        soft.b = texture2D(tSoft, vUv - ca).b;
        /* 奥行きの被写界深度 ── 見つめている中心(注視点の距離)にピント、手前も奥もボケる */
        /* 細い庇などの輪郭では深度が背景側に化け、縁だけ背景ボケに食われて波打つ ──
           近傍5点の「最も手前」の深度で判定し、前景の細部が自分の深度を保つようにする */
        float dd = viewDist(vUv);
        dd = min(dd, viewDist(vUv + vec2(px.x*1.5, 0.)));
        dd = min(dd, viewDist(vUv - vec2(px.x*1.5, 0.)));
        dd = min(dd, viewDist(vUv + vec2(0., px.y*1.5)));
        dd = min(dd, viewDist(vUv - vec2(0., px.y*1.5)));
        float coc = clamp(abs(dd - focusDist) / (focusDist*.62), 0., 1.);  // 焦点範囲をやや広げ、うねりを抑える
        coc = smoothstep(.12, .85, coc) * dofAmt;
        /* ミニチュアの上下の帯（従来）と、深いほうを採用 */
        float d = abs(vUv.y - focusY);
        float band = smoothstep(.09, .40, d);
        band = band*band*tiltAmt;
        float k = clamp(max(band, coc), 0., 1.);
        vec3 col = mix(sharp, soft, k);
        col += texture2D(tBloom, vUv).rgb * strength;
        /* --- 映画的な色の設計 ── S字トーン＋スプリットトーン（影は藍、光は琥珀） --- */
        vec3 sc = col*col*(3.0 - 2.0*col);
        col = mix(col, sc, .30);
        float lum = luma(col);
        vec3 shadowTint = vec3(.93, .965, 1.075);
        vec3 highTint   = mix(vec3(1.035, 1.005, .945), vec3(1.10, 1.02, .875), warm);
        col *= mix(shadowTint, highTint, smoothstep(.12, .78, lum));
        col = mix(vec3(lum), col, sat);
        /* --- フィルムグレイン ── 暗部に少しだけ息づく粒子（バンディングも消える） --- */
        /* sin(巨大値)はGPUの浮動小数点精度で崩壊し、粒ではなく「流れる波・縞」に化ける ──
           入力を常に0〜1に保つfractハッシュ(Hoskins)なら、どの端末でも純粋な粒になる */
        vec3 p3 = fract(vec3(vUv, fract(tGrain*.1031)) * vec3(443.8975, 397.2973, 491.1871));
        p3 += dot(p3, p3.zyx + 19.19);
        float n = fract((p3.x + p3.y) * p3.z);
        col += (n - .5) * .02 * (1.0 - lum*.55);
        /* --- 周辺減光 --- */
        col *= 1.0 - vig*rr*2.4;
        gl_FragColor = vec4(col, 1.);
      }`
  });
  const mesh = new THREE.Mesh(geo, bright);
  quadScene.add(mesh);
  function resize(w, h){
    // 本編は1.35倍で描いて縮小 ── サブピクセルの細い庇のちらつきを実解像度で殺す（SSAA）
    const sw = Math.round(w*1.35), sh = Math.round(h*1.35);
    full.setSize(sw, sh);
    const bw = Math.max(1, w>>1), bh = Math.max(1, h>>1);
    rtA.setSize(bw, bh); rtB.setSize(bw, bh);
    blur.uniforms.res.value.set(bw, bh);

    rtTa.setSize(tw, th); rtTb.setSize(tw, th);

  }

  black.needsUpdate = true;

    renderer.setRenderTarget(rtTb); renderer.render(quadScene, quadCam);

    renderer.setRenderTarget(rtTa); renderer.render(quadScene, quadCam);
    blur.uniforms.tDiffuse.value = rtTa.texture; blur.uniforms.dir.value.set(0,1);
    renderer.setRenderTarget(rtTb); renderer.render(quadScene, quadCam);
    if (withBloom){

      mesh.material = bright; bright.uniforms.tDiffuse.value = full.texture;
      renderer.setRenderTarget(rtA); renderer.render(quadScene, quadCam);
      mesh.material = blur;
      blur.uniforms.res.value.set(rtA.width, rtA.height);
      blur.uniforms.tDiffuse.value = rtA.texture; blur.uniforms.dir.value.set(1,0);
      renderer.setRenderTarget(rtB); renderer.render(quadScene, quadCam);
      blur.uniforms.tDiffuse.value = rtB.texture; blur.uniforms.dir.value.set(0,1);
      renderer.setRenderTarget(rtA); renderer.render(quadScene, quadCam);
      blur.uniforms.tDiffuse.value = rtA.texture; blur.uniforms.dir.value.set(1,0);
      renderer.setRenderTarget(rtB); renderer.render(quadScene, quadCam);
      blur.uniforms.tDiffuse.value = rtB.texture; blur.uniforms.dir.value.set(0,1);
      renderer.setRenderTarget(rtA); renderer.render(quadScene, quadCam);
    }
    // 4) 合成して画面へ ── ピント帯・ブルーム・トイカメラの味付けを一度に
    mesh.material = comp;
    comp.uniforms.tBase.value = full.texture;
    comp.uniforms.tDepth.value = full.depthTexture;
    comp.uniforms.tSoft.value = rtTb.texture;
    comp.uniforms.tBloom.value = withBloom ? rtA.texture : black;

for (let i = 0; i < METEOR_N; i++){
  const mg = new THREE.BufferGeometry();
  mg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const mm = new THREE.LineBasicMaterial({color:0xe6eeff, transparent:true, opacity:0, blending:THREE.AdditiveBlending, fog:false, depthWrite:false});
  const line = new THREE.Line(mg, mm);
  line.frustumCulled = false; line.visible = false;
  scene.add(line);
  meteors.push({line, active:false, life:0, max:1, p:new THREE.Vector3(), v:new THREE.Vector3()});
}
function meteorWhisper(){                        // 流れ星のあと、ときどきだけ、ひとことささやく
  if (subLang === 'off' || Math.random() >= .45) return;
  const L = subLang === 'en'
    ? ['A shooting star — did the wish make it?','One thread of light crossed the night']
    : ['流れ星 ── 願いごとは、間に合った？','夜空を、ひかりがひとすじ'];
  const line = L[Math.floor(Math.random()*L.length)];
  lastLine = line;
  subEl.classList.remove('show');
  setTimeout(() => {
    if (subLang === 'off') return;
    subEl.innerHTML = subLang === 'en' ? line.split(', ').join(',<br>') : line.split('、').join('、<br>');
    subEl.classList.add('show');
  }, 600);
}
function spawnMeteor(){
  const m = meteors.find(m => !m.active);
  if (!m) return;
  const az = Math.random()*Math.PI*2, el = .45 + Math.random()*.4, r = 1150;
  m.p.set(Math.cos(az)*Math.cos(el)*r, Math.sin(el)*r, Math.sin(az)*Math.cos(el)*r);
  const dAz = az + (Math.random() < .5 ? 1 : -1)*(1.2 + Math.random()*.8);
  m.v.set(Math.cos(dAz), -(.55 + Math.random()*.35), Math.sin(dAz)).normalize().multiplyScalar(420 + Math.random()*260);
  m.life = 0; m.max = .8 + Math.random()*.7;
  m.active = true; m.line.visible = true;
  setTimeout(meteorWhisper, 700);
}
function updateMeteors(dt, nt){
  for (const m of meteors){
    if (!m.active) continue;
    m.life += dt; m.p.addScaledVector(m.v, dt);
    const k = Math.min(1, m.life/m.max);
    const fade = Math.sin(k*Math.PI);
    const tl = .10 + .08*fade;                                // 尾は明るいときほど長い
    const pos = m.line.geometry.attributes.position.array;
    pos[0] = m.p.x; pos[1] = m.p.y; pos[2] = m.p.z;
    pos[3] = m.p.x - m.v.x*tl; pos[4] = m.p.y - m.v.y*tl; pos[5] = m.p.z - m.v.z*tl;
    m.line.geometry.attributes.position.needsUpdate = true;
    m.line.material.opacity = fade*.85*nt;
    if (m.life >= m.max){ m.active = false; m.line.visible = false; m.line.material.opacity = 0; }
  }
}

function updateRare(dt){
  if (perf > rareNextCheck){
    rareNextCheck = perf + 5;
    if (rareActive.length < 2){
      const defs = RARE[city] || [];
      for (const def of defs){
        if (rareActive.some(e => e.def === def)) continue;
        if (def.cond() && Math.random() < .014){                          // 条件下で平均6分にひとつ
          const ev = def.make();
          ev.city = city; ev.t = 0; ev.def = def;
          scene.add(ev.group);
          rareActive.push(ev);
          setTimeout(() => rareWhisper(def.ja, def.en), 1800);
          break;
        }
      }
    }
  }
  for (let i = rareActive.length - 1; i >= 0; i--){
    const ev = rareActive[i];
    ev.t += dt;
    const k = ev.t / ev.dur;
    if (ev.city !== city || k >= 1){
      scene.remove(ev.group);
      ev.group.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
      rareActive.splice(i, 1);
      continue;
    }
    ev.update(k, dt, ev);
  }
}

/* ---------- 浮遊物 ── 都市×季節で決まる。それぞれ固有の形を持つ ---------- */
// 桜の花びら（先端に切れ込み）
function petalTexture(){
  const cv = document.createElement('canvas'); cv.width = cv.height = 64;
  const g = cv.getContext('2d');
  const gr = g.createRadialGradient(32, 40, 4, 32, 36, 30);
  gr.addColorStop(0, 'rgba(255,255,255,1)');
  gr.addColorStop(.75, 'rgba(255,240,246,.95)');
  gr.addColorStop(1, 'rgba(255,235,242,.85)');
  g.fillStyle = gr;
  g.beginPath();
  g.moveTo(32, 58);
  g.bezierCurveTo(10, 44, 12, 16, 26, 8);   // 左肩
  g.lineTo(32, 16);                          // 切れ込み
  g.lineTo(38, 8);
  g.bezierCurveTo(52, 16, 54, 44, 32, 58);  // 右肩
  g.closePath(); g.fill();
  return new THREE.CanvasTexture(cv);
}
// 銀杏の葉（扇形・中央に切れ込み・葉柄つき）
function ginkgoTexture(){
  const cv = document.createElement('canvas'); cv.width = cv.height = 64;
  const g = cv.getContext('2d');
  g.fillStyle = 'rgba(255,255,255,.96)';
  g.beginPath();
  g.moveTo(32, 50);
  g.arc(32, 50, 31, Math.PI*1.14, Math.PI*1.86, false);   // 扇
  g.closePath(); g.fill();
  g.globalCompositeOperation = 'destination-out';          // 中央の切れ込み
  g.beginPath();
  g.moveTo(32, 18); g.lineTo(29, 33); g.lineTo(35, 33);
  g.closePath(); g.fill();
  g.globalCompositeOperation = 'source-over';
  g.strokeStyle = 'rgba(120,80,20,.28)'; g.lineWidth = 1;  // 放射状の葉脈
  for (let i = -3; i <= 3; i++){
    const a = Math.PI*1.5 + i*.16;
    g.beginPath(); g.moveTo(32, 50);
    g.lineTo(32+Math.cos(a)*28, 50+Math.sin(a)*28); g.stroke();
  }
  g.strokeStyle = 'rgba(120,80,20,.55)'; g.lineWidth = 2;  // 葉柄
  g.beginPath(); g.moveTo(32, 50); g.lineTo(32, 61); g.stroke();
  return new THREE.CanvasTexture(cv);
}

// カラス ── 羽ばたき角 a（-1=打ち下ろし .. +1=振り上げ）。なめらかで自然な鳥の翼
function crowTextureA(a){
  const cv = document.createElement('canvas'); cv.width = 84; cv.height = 44;
  const g = cv.getContext('2d');
  g.fillStyle = 'rgba(255,255,255,1)';
  const cx = 42, cy = 24;
  const tipDy = a * 13;                          // 翼端の上下
  const midDy = a * 6;                            // 翼中ほどの上下（湾曲）
  const fold  = a > 0 ? a*3 : 0;                  // 振り上げ時にわずかに畳む
  for (const side of [-1, 1]){
    const wmidX = cx + side*(17 - fold), wmidY = cy - 1 + midDy;
    const wtipX = cx + side*(33 - fold*1.6), wtipY = cy - 1 + tipDy;
    // 前縁 → 丸い翼端 → 後縁、をなめらかな曲線で結ぶ一枚の翼
    g.beginPath();
    g.moveTo(cx + side*3, cy - 1);
    g.quadraticCurveTo(wmidX, wmidY - 2, wtipX, wtipY);              // 前縁
    g.quadraticCurveTo(wtipX - side*1.5, wtipY + 2.4, wtipX - side*3, wtipY + 3);   // 丸い翼端
    g.quadraticCurveTo(wmidX - side*1, wmidY + 4.5, cx + side*4, cy + 4.5);         // 後縁（内側にえぐれる）
    g.closePath(); g.fill();
  }
  // 体（流線形）と頭・くちばし
  g.beginPath(); g.ellipse(cx, cy+2, 7, 4, 0, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(cx+7, cy-.2, 3.6, 0, Math.PI*2); g.fill();
  g.beginPath(); g.moveTo(cx+9.6, cy-.7); g.lineTo(cx+13.4, cy); g.lineTo(cx+9.6, cy+.9); g.closePath(); g.fill();
  // くさび形の尾
  const tailSpread = 2.4 + (a < 0 ? -a*1.6 : 0);
  g.beginPath();
  g.moveTo(cx-5, cy+3);
  g.lineTo(cx-15, cy+2.4 - tailSpread*.4);
  g.lineTo(cx-13, cy+3.7);
  g.lineTo(cx-15, cy+5 + tailSpread*.4);
  g.lineTo(cx-5, cy+4.2);
  g.closePath(); g.fill();
  return new THREE.CanvasTexture(cv);
}

      b.z = b.cz + Math.sin(b.ca)*b.cr;
      b.vx = -Math.sin(b.ca)*b.cr*b.cw;
      b.vz =  Math.cos(b.ca)*b.cr*b.cw;
    } else if (b.kind === 'crow' && b.mode === 'circle'){
      b.circleT -= dt;
      b.ca += b.cw*dt;
      b.x = b.cx + Math.cos(b.ca)*b.cr;
      b.z = b.cz + Math.sin(b.ca)*b.cr;
      b.vx = -Math.sin(b.ca)*b.cr*b.cw;
      b.vz =  Math.cos(b.ca)*b.cr*b.cw;
      if (b.circleT <= 0){
        if (Math.random() < .4){                       // 旋回の後、近くの木か屋根へ降りていく
          b.mode = 'landing'; b.landing = true;
          const lx = b.x + (Math.random()-.5)*40, lz = b.z + (Math.random()-.5)*40;
          const remain = 2.4 + Math.random()*1.6;
          b.tvx = (lx - b.x)/remain; b.tvz = (lz - b.z)/remain;
          b.blendT = 0; b.blendDur = .7;                // 速度をなめらかに切り替える
          b.landStart = b.y0; b.landDur = remain; b.landT = 0;
          b.maxLife = b.life + remain;
        } else {                                        // まっすぐ飛び去る
          b.mode = 'linear';
          const dir = b.ca + (Math.random()-.5)*.8;
          const dist = 300 + Math.random()*160;
          const ex = b.x + Math.cos(dir)*dist, ez = b.z + Math.sin(dir)*dist;
          const remain = Math.max(2, b.maxLife - b.life);
          b.tvx = (ex - b.x)/remain; b.tvz = (ez - b.z)/remain;
          b.blendT = 0; b.blendDur = .7;
        }
      }
    } else if (b.mode === 'landing'){
      if (b.blendT < b.blendDur){                        // 速度が旋回の名残りから目標へなめらかに移る
        b.blendT += dt;
        const bt = Math.min(1, b.blendT/b.blendDur);
        b.vx += (b.tvx - b.vx)*bt*dt*6; b.vz += (b.tvz - b.vz)*bt*dt*6;
      } else { b.vx = b.tvx; b.vz = b.tvz; }
      b.landT += dt;
      b.x += b.vx*dt; b.z += b.vz*dt;
      const k = Math.min(1, b.landT / b.landDur);
      const ease = k*k*(3-2*k);                          // 降下そのものもS字でなめらかに
      b.y0 = b.landStart * (1 - ease) + 14*ease;
    } else {
      if (b.blendT < b.blendDur){
        b.blendT += dt;
        b.vx += (b.tvx - b.vx)*dt*3; b.vz += (b.tvz - b.vz)*dt*3;
      }
      // 乱気流のような横揺れ ── カモメは滑空中、風に乗ってゆっくり大きく漂う
      const gliding = (b.kind === 'gull' && b.glide);
      const gust = gliding
        ? Math.sin(b.tPhase*.1)*.5 + Math.sin(b.tPhase*.24+1)*.3
        : Math.sin(b.tPhase*.6)*.4  + Math.sin(b.tPhase*1.7+1)*.2;
      const gustMul = gliding ? 1.4 : 1;
      b.x += (b.vx + gust*3*gustMul)*dt;
      b.z += (b.vz + gust*2.2*gustMul)*dt;
    }
    // 羽ばたきの位相 ── 上下動と絵の切り替えの両方を駆動する
    b.flapPhase += dt*b.flapSpeed*Math.PI*2;
    const flapSin = Math.sin(b.flapPhase);
    if (b.kind === 'crow'){
      // カラスは7コマの連続アニメ（打ち下ろし→振り上げが滑らかに繋がる）
      const idx = Math.floor((b.flapPhase / (Math.PI*2)) % 1 * CROW_FRAMES + CROW_FRAMES) % CROW_FRAMES;
      if (idx !== b.frameIdx){ b.frameIdx = idx; b.sprite.material.map = crowFrames[idx]; }
    } else {
      const frameNow = flapSin > .32 ? 'up' : flapSin < -.32 ? 'down' : 'mid';
      if (frameNow !== b.frame && !(b.kind === 'gull' && b.glide)){
        b.frame = frameNow;
        b.sprite.material.map = b.frame === 'up' ? b.upTex : b.frame === 'down' ? b.downTex : b.midTex;
      }
    }
    let altBob = Math.sin(perf*1.4 + b.phase)*(b.kind === 'crow' ? 2.2 : 1.1);   // ゆったりした高度変化
    // カラスは打ち下ろし（flapSin<0）の直後に体が持ち上がる推進感を与える
    if (b.kind === 'crow') altBob += Math.sin(b.flapPhase - .5)*2.0 * (b.mode === 'landing' ? .3 : 1);
    else altBob += flapSin * .6 * (b.mode === 'landing' ? 0 : 1);
    let bank = 0;
    if ((b.kind === 'gull' || b.kind === 'tobi') && b.mode !== 'landing'){
      b.glideT -= dt;
      if (b.glideT <= 0){
        b.glide = !b.glide;
        b.glideT = b.glide ? 3.6 + Math.random()*3.2 : .18 + Math.random()*.16;   // ほぼ滑空、羽ばたきは一瞬だけ
      }
      if (b.glide){
        b.sprite.material.map = b.midTex;                            // 滑空中は、翼を浅く保ったまま固定
        bank = Math.sin(perf*.16 + b.phase)*.035 + Math.sin(perf*.06 + b.phase*1.7)*.02;  // ほぼ傾かず、水平に
        altBob += Math.sin(perf*.09 + b.phase*1.3)*1.3;               // 綿毛のように、ごくわずかだけ上下に漂う
      }
    }
    b.sprite.position.set(b.x, b.y0 + altBob, b.z);
    // 見えている間は、思い出したように数秒おきにまた鳴く
    if (ambOn){
      b.cawTimer -= dt;
      if (b.cawTimer <= 0){
        if (b.kind === 'crow'){
          b.cawTimer = 6 + Math.random()*5;
          if (b.vocal && isPointVisible(b.x, b.y0, b.z, 12)) crowCaw();
        } else if (b.kind === 'gull'){
          b.cawTimer = 3.2 + Math.random()*2.6;
          if (isPointVisible(b.x, b.y0, b.z, 12)) seagull();
        } else {                                                    // トビ ── 昼の空高くから、まれにピーヒョロロと
          b.cawTimer = 26 + Math.random()*18;
          const tp = periodKey();
          const daytimeNow = (tp === 'asa' || tp === 'hiru' || tp === 'golden');
          if (b.vocal && daytimeNow && isPointVisible(b.x, b.y0, b.z, 16)) tobiCry();
        }
      }
    }
    // 向きは瞬間ではなく、旋回速度に応じてなめらかに追従させる（急な回転スナップを防ぐ）
    const heading = -Math.atan2(b.vz, b.vx);
    let diff = heading - b.curRot;
    while (diff > Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    const turnRate = b.mode === 'circle' ? 14 : 3.2;       // 旋回中は速く、直線飛行ではごく穏やかに追従
    const maxStep = turnRate*dt;
    diff = Math.max(-maxStep, Math.min(maxStep, diff));
    b.curRot += diff;
    const turnBank = (b.mode === 'circle') ? -b.cw*.18 : 0;   // 旋回の内側へ、わずかに傾く
    b.sprite.material.rotation = b.curRot + bank + turnBank;
    if (b.mode === 'landing' && b.landT >= b.landDur){ b.active = false; b.sprite.visible = false; }
    else if (b.life >= b.maxLife){ b.active = false; b.sprite.visible = false; }
  }
}

function pyramid(w, h, m){
  const p = new THREE.Mesh(new THREE.CylinderGeometry(0, w, h, 4), m);
  p.rotation.y = Math.PI/4;
  return p;
}
function naturalMountain(r, h, seed){
  // なだらかな山 ── 円弧の断面で上までゆったり太く、起伏は高度とともに二乗で消えていく
  const g = new THREE.ConeGeometry(r, h, 24, 10);
  const pos = g.attributes.position;
  const rnd = n => { const x = Math.sin(seed*91.7 + n*127.1)*43758.5453; return x - Math.floor(x); };
  const p1 = rnd(1)*Math.PI*2, p2 = rnd(2)*Math.PI*2;
  const a1 = .032 + .02*rnd(4), a2 = .016 + .012*rnd(5);       // 起伏はごく控えめに ── 遠景の山なみの静けさ
  for (let i = 0; i < pos.count; i++){
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const rad = Math.hypot(x, z);
    const t = Math.max(0, Math.min(1, (y + h/2) / h));
    if (rad < 1e-3){
      if (t > .5) pos.setY(i, y - h*.07);                      // 頂点は最上段リング(.90h)のすぐ上(.93h) ── 丸い頂
      continue;
    }
    const ang = Math.atan2(z, x);
    // (1 - t^a)^b の断面 ── 接地点では傾斜ゼロで裾野が地面に溶け、中腹で立ち上がり、頂は丸いまま
    const bell = Math.pow(Math.max(0, 1 - Math.pow(t, .72)), .56);
    const fade = (1 - t)*(1 - t);                              // 起伏は高度の二乗で静まり、山頂付近は完全に滑らか
    const ridge = 1 + (a1*Math.sin(ang*3 + p1) + a2*Math.sin(ang*5 + p2)) * fade;
    const nr = r * bell * ridge;
    pos.setX(i, Math.cos(ang)*nr);
    pos.setZ(i, Math.sin(ang)*nr);
    if (t < .01) pos.setY(i, y + h*.008*Math.sin(ang*4 + p2)); // 裾のラインは、かすかに揺れる程度に
  }
  g.computeVertexNormals();
  return g;
}
function seededRnd(seed){ let s = seed; return () => (s = s*16807 % 2147483647) / 2147483647; }

const sharedMats = new Set([...Object.values(mat), ...bmats]);
function disposeGroup(g){
  if (!g) return;
  g.traverse(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material && !sharedMats.has(o.material)) o.material.dispose();   // 都市固有の材質は捨てる（共有材質は残す）
  });
  scene.remove(g);
}
function buildGrid(cfg){
  const g = new THREE.Group();
  const rnd = seededRnd(cfg.seed);
  for (let ix = 0; ix < N; ix++) for (let iz = 0; iz < N; iz++){
    if (cfg.skip(ix, iz)) continue;
    const cx = blockCenter(ix), cz = blockCenter(iz);
    const plinth = new THREE.Mesh(boxGeo, mat.walk);
    plinth.scale.set(BLOCK+2.4, .7, BLOCK+2.4);
    plinth.position.set(cx, .35, cz);
    plinth.receiveShadow = true; g.add(plinth);
    let peak = 0;
    cfg.peaks.forEach(p => { peak += Math.max(0, p.r - Math.hypot(ix-p.x, iz-p.z)) * p.h; });
    const nB = 1 + Math.floor(rnd()*3);
    for (let b = 0; b < nB; b++){
      const w = 5 + rnd()*7, d = 5 + rnd()*7;
      const h = cfg.flat ? 3.5 + rnd()*7 : 5 + rnd()*10 + peak*(.6 + rnd()*.5);
      const bx = cx + (rnd()-.5)*(BLOCK-w), bz = cz + (rnd()-.5)*(BLOCK-d);
      // ランドマークの敷地には建てない ── 城がビルに埋もれない
      if (cfg.clear && cfg.clear.some(c => Math.hypot(bx - c.x, bz - c.z) < c.r + Math.max(w, d)*.5)) continue;
      const m = new THREE.Mesh(boxGeo, bmats[Math.floor(rnd()*bmats.length)]);
      m.scale.set(w, h, d);
      m.position.set(bx, 1, bz);
      m.castShadow = m.receiveShadow = true; g.add(m);
      if (h > 26 && rnd() < .75){
        const rt = new THREE.Mesh(boxGeo, mat.steel);
        rt.scale.set(w*.32, 1.6+rnd()*2, d*.32);
        rt.position.set(bx+(rnd()-.5)*w*.3, 1+h, bz+(rnd()-.5)*d*.3);
        g.add(rt);
      }
    }
  }
  return g;
}
function setCity(c){

function nightness(){
  if (hour >= 20.4 || hour < 4.6) return 1;
  if (hour >= 7.4 && hour < 17.4) return 0;
  if (hour < 7.4) return Math.max(0, Math.min(1, (7.4 - hour) / 2.8));
  return Math.max(0, Math.min(1, (hour - 17.4) / 3));
}
function applyTime(){
  const KF = keyframes();
  let a = KF[0], b = KF[KF.length-1];
  for (let i = 0; i < KF.length-1; i++){
    if (hour >= KF[i].h && hour <= KF[i+1].h){ a = KF[i]; b = KF[i+1]; break; }
  }
  const kLin = (b.h === a.h) ? 0 : (hour - a.h) / (b.h - a.h);
  const k = kLin*kLin*(3-2*kLin);
  skyUni.topColor.value.copy(lerpHex(a.skyT, b.skyT, k));
  skyUni.midColor.value.copy(lerpHex(a.skyM, b.skyM, k));
  skyUni.horColor.value.copy(lerpHex(a.skyH, b.skyH, k));
  skyUni.glowColor.value.copy(lerpHex(a.glowC, b.glowC, k));
  skyUni.glowStrength.value = a.glowS + (b.glowS - a.glowS)*k;
  scene.fog.color.copy(lerpHex(a.fog, b.fog, k));
  hemi.color.copy(lerpHex(a.hemi, b.hemi, k));
  sun.color.copy(lerpHex(a.sun, b.sun, k));
  sun.intensity = a.sunI + (b.sunI - a.sunI)*k;
  hemi.intensity = a.hemiI + (b.hemiI - a.hemiI)*k;
  const ang = ((hour - 6) / 12) * Math.PI;
  const elev = Math.sin(ang);
  sun.position.set(Math.cos(ang)*280, Math.max(elev,.1)*240+20, 110);
  skyUni.sunDir.value.set(Math.cos(ang), Math.max(elev,-.06), .38).normalize();
  const nt = nightness();
  const wave = .88 + Math.sin(perf*2.1)*.12;
  // 窓明かりは一斉ではなく、家々の事情のように、まちまちに点いていく
  bmats.forEach((b2,i) => {
    const th = .14 + ((i*.37) % 1)*.5;                       // 材質ごとに違う「点灯のころあい」
    let on = Math.max(0, Math.min(1, (nt - th) / .22));
    on = on*on*(3-2*on);
    b2.emissiveIntensity = on*(.18+(i%3)*.05)*wave;
  });
  mat.glass.emissiveIntensity = nt*.4;
  mat.brick.emissiveIntensity = nt*.18;
  mat.white.emissiveIntensity = nt*.3;
  mat.steel.emissiveIntensity = nt*.5;
  mat.red.emissiveIntensity = nt*.35;
  dynGlow.forEach(d => { d.m.emissiveIntensity = d.day + nt*d.night; });
  if (dynBeacon) dynBeacon.emissiveIntensity = nt*(Math.sin(perf*4) > 0 ? 1.8 : .15);
  if (neonMat) neonMat.opacity = nt*.95;
  lampMat.opacity = nt*.9;
  const starK = CITY_STARS[city] || .7;
  starUni.uTime.value = perf;
  starUni.uOpacity.value = nt*1.05;
  starUni.uPix.value = Math.min(devicePixelRatio, 2);
  starGeo.setDrawRange(0, Math.floor(STAR_N*starK));
  // 月 ── 太陽のほぼ反対側を、地平線近くの低い弧で巡る（低いカメラでも見える）
  const mAng = ang + Math.PI;
  const mEl = Math.sin(mAng);
  const moonUp = Math.max(0, Math.min(1, (mEl+.15)*1.5));
  const moonR = 1080;
  moon.position.set(Math.cos(mAng)*moonR, 80 + moonUp*150, Math.sin(mAng)*moonR);
  moonGlow.position.copy(moon.position);
  moonMat.opacity = nt*moonUp*.46;
  moonGlowMat.opacity = nt*moonUp*.16;
  // 秋は中秋の名月 ── 大きく、金色に輝く満月
  if (season === 'autumn'){
    moon.scale.set(98, 98, 1);
    moonMat.color.setHex(0xffe6ad);
    moonGlow.scale.set(280, 280, 1);
    moonGlowMat.opacity = nt*moonUp*.22;
  } else {
    moon.scale.set(72, 72, 1);
    moonMat.color.setHex(0xeff3f8);
    moonGlow.scale.set(230, 230, 1);
  }
  // 水面が空を映す ── 太陽が低いほど（朝夕）強く、夜は月あかりの藍に沈む
  const hor = skyUni.horColor.value, top = skyUni.topColor.value;
  const lowSun = 1 - Math.min(1, Math.abs(elev)*1.6);        // 地平線近くで最大
  const reflect = 0.10 + lowSun*0.34*(1-nt) + nt*0.06;
  mat.river.emissive.copy(hor).multiplyScalar(reflect);
  mat.river.emissive.lerp(top, 0.25*nt);                     // 夜は天頂の藍を少し混ぜる
  mat.sea.emissive.copy(hor).multiplyScalar(reflect*0.85);
  mat.sea.emissive.lerp(top, 0.3*nt);
  document.getElementById('clock').textContent =
    String(Math.floor(hour)).padStart(2,'0') + ':' + String(Math.floor((hour%1)*60)).padStart(2,'0');
  if (!sliderHeld) slider.value = hour;                      // 操作中はスライダーを奪い合わない
}

let musicStyle = 'ambient', schedTimer = null;
let nextChord = 0, chordIdx = 0, nextPluck = 0;
let nextStep = 0, stepIdx = 0;
let nextBox = 0, nextBoxPad = 0, boxPadIdx = 0, nextBoxMotif = 0;

function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = .6;
  masterGain.connect(audioCtx.destination);
  filterNode = audioCtx.createBiquadFilter();
  filterNode.type = 'lowpass'; filterNode.frequency.value = 1600; filterNode.Q.value = .4;
  filterNode.connect(masterGain);
  const delay = audioCtx.createDelay(2); delay.delayTime.value = .46;
  const fb = audioCtx.createGain(); fb.gain.value = .34;
  const wet = audioCtx.createGain(); wet.gain.value = .3;
  delay.connect(fb); fb.connect(delay);
  delay.connect(wet); wet.connect(filterNode);
  delaySend = delay;
  noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*2, audioCtx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random()*2 - 1;
  ensureAmbBus();
}
function padNote(freq, t, dur, g0=.045){
  for (const det of [-4, 4]){
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = freq; o.detune.value = det;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(g0, t+2.6);
    g.gain.setValueAtTime(g0, t+dur-4.5);
    g.gain.linearRampToValueAtTime(0, t+dur);
    o.connect(g); g.connect(filterNode); g.connect(delaySend);
    o.start(t); o.stop(t+dur+.1);
  }
}
function pluckNote(freq, t){
  const o = audioCtx.createOscillator();
  o.type = 'triangle'; o.frequency.value = freq;
  const g = audioCtx.createGain();
  const dec = SM().pluckDecay;
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.14, t+.015);
  g.gain.exponentialRampToValueAtTime(.0001, t+dec);
  o.connect(g); g.connect(filterNode); g.connect(delaySend);
  o.start(t); o.stop(t+dec+.2);
}
/* ---------- 街ごとの「声」── その土地の楽器で爪弾く ---------- */
function glassNote(f, t, vel=1){            // 札幌 ── 雪あかりの硝子。澄んだ倍音がゆっくり消える
  pluckNote(f, t);
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f*2;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.03*vel, t+.02);
  g.gain.exponentialRampToValueAtTime(.0001, t+2.4);
  o.connect(g); g.connect(filterNode); g.connect(delaySend);
  o.start(t); o.stop(t+2.6);
}
function kotoNote(f, t, vel=1){             // 京都 ── 箏。爪の立ち上がりと、押手のようにわずかに沈む音程
  const o = audioCtx.createOscillator(); o.type = 'triangle';
  o.frequency.setValueAtTime(f*1.014, t);
  o.frequency.exponentialRampToValueAtTime(f, t+.07);
  const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f*2;
  const g = audioCtx.createGain(), g2 = audioCtx.createGain();
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.15*vel, t+.008);
  g.gain.exponentialRampToValueAtTime(.0001, t+1.15);
  g2.gain.setValueAtTime(.0001, t);
  g2.gain.exponentialRampToValueAtTime(.05*vel, t+.006);
  g2.gain.exponentialRampToValueAtTime(.0001, t+.45);
  o.connect(g); o2.connect(g2);
  g.connect(filterNode); g.connect(delaySend); g2.connect(filterNode);
  o.start(t); o.stop(t+1.3); o2.start(t); o2.stop(t+.6);
}
function shamiNote(f, t, vel=1){            // 大阪 ── 三味線。撥の当たる乾いたアタック
  const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = f;
  const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = f*4; lp.Q.value = .7;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.09*vel, t+.005);
  g.gain.exponentialRampToValueAtTime(.0001, t+.5);
  const n = audioCtx.createBufferSource(); n.buffer = noiseBuf;   // 撥音 ── ごく短い擦れ
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2600; bp.Q.value = 1;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(.05*vel, t);
  ng.gain.exponentialRampToValueAtTime(.0001, t+.03);
  o.connect(lp); lp.connect(g); g.connect(filterNode); g.connect(delaySend);
  n.connect(bp); bp.connect(ng); ng.connect(filterNode);
  o.start(t); o.stop(t+.6); n.start(t); n.stop(t+.05);
}
function sanshinNote(f, t, vel=1){          // 那覇 ── 三線。少し鼻にかかった軽い爪音
  const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = f;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = Math.min(3200, f*2.6); bp.Q.value = 1.2;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.16*vel, t+.006);
  g.gain.exponentialRampToValueAtTime(.0001, t+.55);
  o.connect(bp); bp.connect(g); g.connect(filterNode); g.connect(delaySend);
  o.start(t); o.stop(t+.7);
}
function bellNote(f, t, vel=1){             // 福岡 ── 港の鐘。わずかに濁る倍音が海風に伸びる
  const parts = [[1, .1], [2.4, .028], [3.9, .012]];
  for (const [m, a] of parts){
    const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f*m;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(.0001, t);
    g.gain.exponentialRampToValueAtTime(a*vel, t+.01);
    g.gain.exponentialRampToValueAtTime(.0001, t+2.2/Math.sqrt(m));
    o.connect(g); g.connect(filterNode); g.connect(delaySend);
    o.start(t); o.stop(t+2.4);
  }
}
function breathNote(f, t, dur){             // 尺八 ── 息の混ざる長い一音。京都の夜にだけ
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
  const vib = audioCtx.createOscillator(); vib.frequency.value = 4.6;
  const vibG = audioCtx.createGain();
  vibG.gain.setValueAtTime(0, t);
  vibG.gain.linearRampToValueAtTime(f*.012, t+dur*.6);          // ゆらぎは後半に深くなる
  vib.connect(vibG); vibG.connect(o.frequency);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.0001, t);
  g.gain.linearRampToValueAtTime(.05, t+dur*.35);
  g.gain.linearRampToValueAtTime(.0001, t+dur);
  const n = audioCtx.createBufferSource(); n.buffer = noiseBuf; n.loop = true;   // 息の成分
  const nf = audioCtx.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = f; nf.Q.value = 9;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(.0001, t);
  ng.gain.linearRampToValueAtTime(.035, t+dur*.35);
  ng.gain.linearRampToValueAtTime(.0001, t+dur);
  o.connect(g); n.connect(nf); nf.connect(ng);
  g.connect(filterNode); ng.connect(filterNode); g.connect(delaySend);
  o.start(t); o.stop(t+dur+.1);
  vib.start(t); vib.stop(t+dur+.1);
  n.start(t); n.stop(t+dur+.1);
}
const CITY_VOICE = { glass:glassNote, ep:(f,t)=>epNote(f,t,1.5), koto:kotoNote, shami:shamiNote, sanshin:sanshinNote, bell:bellNote };
function cityPluck(f, t, vel=1){
  (CITY_VOICE[SM().inst] || pluckNote)(f, t, vel);
  if (SM().inst === 'sanshin' && Math.random() < .3) sanshinNote(f, t+.09, vel*.55);   // 三線 ── ときどき返しの一撥
}
let nextMotif = 0;
function playMotif(t){
  const M = SM();
  // 街の「節（ふし）」── ルバートで、わずかに走り、最後の一音の前でためる
  const L = M.motif.length;
  let tt = t;
  M.motif.forEach((f, i) => {
    const last = i === L - 1;
    cityPluck(f, tt, last ? 1.25 : .85 + .1*Math.sin(i*1.7));
    tt += M.motifStep * (i < L - 2 ? (1 - i*.035) : 1.55);
  });
  if (Math.random() < .5) cityPluck(M.motif[L-1]*.5, tt + 1.2, .4);   // 節の残響が、低くひとつだけこたえる
  if (city === 'kyoto' && nightness() > .4 && Math.random() < .6)
    breathNote(M.motif[L-1], tt + 1.4, 5.5);                           // 余韻に、尺八の一音
  return tt - t;
}
/* 切なさの所作 ── ばらばらの音ではなく、意味を持つ小さな身振りで爪弾く */
function playGesture(sc, t, nt){
  const n = sc.length;
  const i = 1 + Math.floor(Math.random()*(n - 1));
  const r = Math.random();
  const oct = (nt > .5 && Math.random() < .3) ? 2 : 1;                 // 夜はときどき、高く細い声で
  if (r < .38){
    // ため息 ── 隣の音へ、落ちる（下行2度 ── 切なさの原器）
    cityPluck(sc[i]*oct, t, .95);
    cityPluck(sc[i-1]*oct, t + .6 + Math.random()*.25, .6);
    if (Math.random() < .25) cityPluck(sc[i]*oct*.5, t + 1.8, .4);     // 遠くで、自分の残響がこたえる
  } else if (r < .62 && i < n - 1){
    // 跳んで、降りる ── 高みへ手を伸ばし、届かず、ひとつ戻る
    const j = Math.min(n - 1, i + 3 + Math.floor(Math.random()*2));
    cityPluck(sc[Math.max(0, i-1)]*oct, t, .75);
    cityPluck(sc[j]*oct, t + .5, 1.0);
    cityPluck(sc[j-1]*oct, t + 1.2, .55);
  } else if (r < .8){
    // 保留 ── ぶつかったまま少し待ち、ゆっくりほどける
    cityPluck(sc[i]*oct, t, .9);
    cityPluck(sc[i-1]*oct, t + 1.0 + Math.random()*.3, .5);
  } else {
    cityPluck(sc[i]*oct, t, .9);                                       // ただ一音、置いていく
  }
}
function schedAmbient(){
  const M = SM();
  const ahead = audioCtx.currentTime + .6;
  while (nextChord < ahead){
    const ch = M.chords[chordIdx % 4];
    ch.forEach(f => padNote(f, nextChord, 8.2));
    // 疼きの一声 ── 9thの高音が、和音より遅れて滲み、先に消える
    if (Math.random() < .45) padNote(ch[0]*2.25, nextChord + 2.4, 5.0, .016);
    chordIdx++; nextChord += 8;
  }
  while (nextPluck < ahead){
    const nt = nightness();
    if (nextPluck >= nextMotif){
      const len = playMotif(nextPluck);
      nextMotif = nextPluck + 30 + Math.random()*34;
      nextPluck += len + 2;
      continue;
    }
    if (Math.random() < (nt > .5 ? M.pluckNight : M.pluckDay)){
      const sc = nt > .5 ? M.scaleNight : M.scaleDay;
      playGesture(sc, nextPluck, nt);
    }
    nextPluck += 2;
  }
}
function kick(t, v){
  v = v || 1;
  // 丸く沈む、MPCのようなキック ── 立ち上がりに小さなクリック、胴は深く
  const o = audioCtx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(92, t);
  o.frequency.exponentialRampToValueAtTime(40, t+.14);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.5*v, t);
  g.gain.exponentialRampToValueAtTime(.0001, t+.3);
  o.connect(g); g.connect(filterNode);
  o.start(t); o.stop(t+.36);
  const n = audioCtx.createBufferSource(); n.buffer = noiseBuf;
  const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1400;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(.09*v, t);
  ng.gain.exponentialRampToValueAtTime(.0001, t+.02);
  n.connect(lp); lp.connect(ng); ng.connect(filterNode);
  n.start(t); n.stop(t+.03);
}
function snare(t, v, ghost){
  v = v || 1;
  // 埃っぽい、こもったスネア ── ゴーストは囁くように
  const src = audioCtx.createBufferSource(); src.buffer = noiseBuf;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = ghost ? 1350 : 1550; bp.Q.value = .8;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime((ghost ? .07 : .24)*v, t);
  g.gain.exponentialRampToValueAtTime(.0001, t+(ghost ? .07 : .15));
  src.connect(bp); bp.connect(g); g.connect(filterNode);
  src.start(t); src.stop(t+.2);
  if (!ghost){
    const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = 172;
    const g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(.11*v, t);
    g2.gain.exponentialRampToValueAtTime(.0001, t+.09);
    o.connect(g2); g2.connect(filterNode);
    o.start(t); o.stop(t+.12);
  }
}
function hat(t, open, v){
  v = v || 1;
  const src = audioCtx.createBufferSource(); src.buffer = noiseBuf;
  const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6800;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.075*v, t);
  g.gain.exponentialRampToValueAtTime(.0001, t+(open?.22:.045));
  src.connect(hp); hp.connect(g); g.connect(filterNode);
  src.start(t); src.stop(t+.27);
}
function bassNote(f, t, dur, v){
  v = v || 1;
  // 温かいサブベース ── 曲の重心。ローパスの奥で静かに支える
  const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
  const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f; o2.detune.value = 4;
  const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 330; lp.Q.value = .5;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.16*v, t+.025);
  g.gain.exponentialRampToValueAtTime(.0001, t+dur);
  o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(filterNode);
  o.start(t); o.stop(t+dur+.05); o2.start(t); o2.stop(t+dur+.05);
}
function epNote(f, t, dur, v){
  v = v || 1;
  const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = f; o.detune.value = -3;
  const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f; o2.detune.value = 5;
  // テープの揺れ ── ごくゆっくりしたピッチのうねり（ウーワウフラッター）
  const wow = audioCtx.createOscillator(); wow.frequency.value = .37 + Math.random()*.12;
  const wowG = audioCtx.createGain(); wowG.gain.value = 4.5;
  wow.connect(wowG); wowG.connect(o.detune); wowG.connect(o2.detune);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.06*v, t+.012);
  g.gain.exponentialRampToValueAtTime(.0001, t+dur);
  o.connect(g); o2.connect(g); g.connect(filterNode);
  const send = audioCtx.createGain(); send.gain.value = .35;
  g.connect(send); send.connect(delaySend);
  o.start(t); o.stop(t+dur+.05);
  o2.start(t); o2.stop(t+dur+.05);
  wow.start(t); wow.stop(t+dur+.05);
}
function epRoll(chord, t, dur, v){
  // ヌジャベスのピアノのように、和音は同時ではなく、指がころがるように
  v = v || 1;
  chord.forEach((f, i) => epNote(f, t + i*(.026 + Math.random()*.02), dur, v*(1 - i*.08)));
}
function pop(t){
  const src = audioCtx.createBufferSource(); src.buffer = noiseBuf;
  const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 3200;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.05, t);
  g.gain.exponentialRampToValueAtTime(.0001, t+.016);
  src.connect(lp); lp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t+.03);
}
function startCrackle(){
  crackleSrc = audioCtx.createBufferSource();
  crackleSrc.buffer = noiseBuf; crackleSrc.loop = true;
  const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 900;
  const g = audioCtx.createGain(); g.gain.value = .012;
  crackleSrc.connect(lp); lp.connect(g); g.connect(masterGain);
  crackleSrc.start();
}
function schedLofi(){
  const M = SM();
  const SIXT = 60 / M.bpm / 4;
  const ahead = audioCtx.currentTime + .4;
  while (nextStep < ahead){
    const s = stepIdx % 16, bar = Math.floor(stepIdx / 16);
    const lastBar = (bar % 8) === 7;                          // 8小節目 ── 息継ぎの小節
    let t = nextStep;
    if (s % 4 === 2) t += SIXT*.58;                           // 揺れたスウィング ── ジャストより深く、酔うように
    /* ---- ディラのグリッド ── 楽器ごとに「時間の居場所」が違う ---- */
    const tKick  = t - SIXT*.03 + (Math.random()-.5)*.012;    // キックはわずかに前のめり
    const tSnare = t + SIXT*.115 + (Math.random()-.5)*.008;   // スネアは引きずる ── この遅れがすべての鍵
    const tHat   = t + (Math.random()-.5)*.014;               // ハットは人の手の揺らぎで
    if (s % 2 === 0){
      const hv = (s % 4 === 0 ? 1 : .58) + (Math.random()-.5)*.25;   // 強拍は強く、裏は弱く
      hat(tHat, s === 14 && Math.random() < .3, hv);
    }
    const c = M.lofi[bar % 4];
    if (s === 0){
      kick(tKick);
      epRoll(c, t, 2.6);                                      // 和音は、指がころがるロールで
      padNote(c[0], t, 4.4, .02);                             // 低くあたたかい霞を、一枚だけ敷く
      bassNote(c[0], t, SIXT*5.5);                            // ベース ── 曲の重心
    }
    if (!lastBar || s < 4){                                   // 息継ぎの小節はキックを休ませる
      if (s === 7 && Math.random() < .65){ kick(tKick, .9); if (Math.random() < .6) bassNote(Math.random() < .5 ? c[0] : c[0]*1.5, tKick, SIXT*2.5, .8); }
      if (s === 10 && Math.random() < .3){ kick(tKick, .8); }
      if (s === 3 && Math.random() < .15) kick(tKick, .7);    // ときどき、つんのめる
    }
    if (s === 4 || s === 12) snare(tSnare);
    if ((s === 3 || s === 11) && Math.random() < .18) snare(tSnare, 1, true);   // ゴースト ── 気配だけの一打
    if (s === 15 && Math.random() < .25) snare(tSnare, 1, true);
    if (lastBar && s === 14){                                 // 8小節目の終わり ── 小さなフィルで次へ
      snare(tSnare, .8, true); snare(tSnare + SIXT*.33, .9, true); snare(tSnare + SIXT*.66, 1);
    }
    /* ---- ヌジャベスの旋律 ── 4小節でひとつの呼吸 ---- */
    if (bar % 4 === 2 && s === 0){
      // 3小節目：街の「節」が8分のグリッドに乗って、フックとして流れていく
      M.motif.forEach((f, i) => {
        const tt = t + i*SIXT*2 + (i % 2 === 1 ? SIXT*.58 : 0) + (Math.random()-.5)*.01;
        const last = i === M.motif.length - 1;
        if (M.inst === 'koto' || M.inst === 'shami' || M.inst === 'sanshin') cityPluck(f*2, tt, last ? 1.1 : .8);
        else epNote(f*2, tt, last ? 2.4 : 1.2, last ? 1.15 : .9);
      });
    } else if (bar % 4 === 0 && s === 8 && Math.random() < .6){
      // 1小節目の後半：問いかけのような一音
      const sc = M.scaleNight;
      epNote(sc[Math.floor(Math.random()*sc.length)]*2, t, 1.6, .8);
    } else if (bar % 4 === 3 && s === 12 && Math.random() < .45){
      // 4小節目の終わり：次の呼吸へ渡す、短い返事
      const f = c[1 + Math.floor(Math.random()*2)]*2;
      if (M.inst === 'koto' || M.inst === 'shami' || M.inst === 'sanshin') cityPluck(f, t, .7);
      else epNote(f, t, 1.2, .75);
    }
    if (Math.random() < .09) pop(nextStep + Math.random()*.18);
    stepIdx++; nextStep += SIXT;
  }
}
function boxNote(f, t){
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.1, t+.014);
  g.gain.exponentialRampToValueAtTime(.0001, t+2.4);
  o.connect(g); g.connect(filterNode);
  const send = audioCtx.createGain(); send.gain.value = .5;
  g.connect(send); send.connect(delaySend);
  o.start(t); o.stop(t+2.5);
}
function schedBox(){
  const M = SM();
  const ahead = audioCtx.currentTime + .5;
  while (nextBox < ahead){
    if (nextBox >= nextBoxMotif){
      // オルゴールが、街の節をひとくさり口ずさむ
      M.motif.forEach((f, i) => boxNote(f*2, nextBox + i*M.boxStep));
      nextBox += (M.motif.length + 2)*M.boxStep;
      nextBoxMotif = nextBox + 22 + Math.random()*26;
      continue;
    }
    if (Math.random() < .72){
      const f = M.scaleDay[Math.floor(Math.random()*M.scaleDay.length)]*2;
      boxNote(f, nextBox);
      if (Math.random() < .22) boxNote(f*1.5, nextBox+.02);
    }
    nextBox += M.boxStep;
  }
  while (nextBoxPad < ahead){
    padNote(M.chords[boxPadIdx % 4][0], nextBoxPad, 8.2, .03);
    boxPadIdx++; nextBoxPad += 8;
  }
}
let bedSrc = null, bedLfo = null, bedGain = null;
function startBed(){
  stopBed();
  bedSrc = audioCtx.createBufferSource();
  bedSrc.buffer = noiseBuf; bedSrc.loop = true;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 340; lp.Q.value = .3;
  bedGain = audioCtx.createGain(); bedGain.gain.value = SM().wind;
  bedLfo = audioCtx.createOscillator(); bedLfo.frequency.value = .06;
  const lfoG = audioCtx.createGain(); lfoG.gain.value = SM().wind*.5;
  bedLfo.connect(lfoG); lfoG.connect(bedGain.gain);
  bedSrc.connect(lp); lp.connect(bedGain); bedGain.connect(ambBus);   // 風も景色の音 ── 環境音バスへ
  bedSrc.start(); bedLfo.start();
}
function stopBed(){
  if (bedSrc){ try{ bedSrc.stop(); bedLfo.stop(); }catch(e){} bedSrc = null; bedGain = null; }
}

let ambOn = false, ambTimer = null, ambNodes = null;
/* 環境音バス ── すべての環境音は一度ここを通り、「遠さ」と「空気」をまとって景色に沈む */
let ambBus = null, ambAir = null, ambTone = null;
function ensureAmbBus(){
  if (ambBus) return;
  ambBus = audioCtx.createGain(); ambBus.gain.value = .9;
  ambTone = audioCtx.createBiquadFilter();                  // 眺めが引くほど、こもって遠くなる
  ambTone.type = 'lowpass'; ambTone.frequency.value = 5500; ambTone.Q.value = .3;
  ambBus.connect(ambTone); ambTone.connect(masterGain);
  // 「空気」── ごく淡い二枚の反射。音の輪郭を景色の奥へ送る
  ambAir = audioCtx.createGain(); ambAir.gain.value = .14;
  ambBus.connect(ambAir);
  for (const [dt, fb, lpf] of [[.083, .22, 1300], [.157, .18, 900]]){
    const dl = audioCtx.createDelay(1); dl.delayTime.value = dt;
    const fg = audioCtx.createGain(); fg.gain.value = fb;
    const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = lpf;
    ambAir.connect(dl); dl.connect(lp); lp.connect(fg); fg.connect(dl);
    lp.connect(ambTone);
  }
}
function crowCaw(depth){     // カラス ── 夕焼け小焼けの「カアーー」。長く伸び、語尾が揺れて垂れる
  const t0 = audioCtx.currentTime + .08;
  const nCaw = Math.random() < .2 ? 4 : 3;                            // 「カアカアカアーー」── ひと息の三連（まれに四連）
  const pan = audioCtx.createStereoPanner();
  const panV = Math.max(-1, Math.min(1, (Math.random()-.5)*1.3)) * (depth ? -1 : 1);   // 返しの声は反対側から
  pan.pan.value = panV;
  const distLp = audioCtx.createBiquadFilter(); distLp.type = 'lowpass';
  distLp.frequency.value = (depth ? 700 : 950) + Math.random()*200;   // 返しの声は、さらに遠くこもる
  distLp.connect(pan); pan.connect(ambBus);
  // 残響は声ごとに個別に送る ── 短い「カア」は乾いたまま、最後の「カアーー」だけ深い余韻をまとう
  const sendLast = audioCtx.createGain(); sendLast.gain.value = 1.4;
  sendLast.connect(delaySend);
  const sendShort = audioCtx.createGain(); sendShort.gain.value = .25;
  sendShort.connect(delaySend);
  const f0 = (depth ? 395 : 430) + Math.random()*60;                  // 低く、穏やかな高さ
  const baseAmp = depth ? .022 : .05;
  let t = t0;
  for (let k = 0; k < nCaw; k++){
    const last = k === nCaw - 1;
    const dur = last ? .95 + Math.random()*.3 : .48 + Math.random()*.12;   // 「カア」×2は短く、最後だけ「カアーー」
    const f = f0 * (0.98 + Math.random()*0.04) * (1 - k*0.012);
    const o = audioCtx.createOscillator(); o.type = 'triangle';        // 角のない、丸く柔らかい声
    o.frequency.setValueAtTime(f, t);
    if (last){
      o.frequency.setValueAtTime(f*.985, t+dur*.35);                   // 高さを保ち
      o.frequency.exponentialRampToValueAtTime(f*.78, t+dur*.75);      // ゆっくり垂れて
      o.frequency.exponentialRampToValueAtTime(f*.60, t+dur+.15);      // 語尾は深く、沈んでいく
      // 語尾のゆらぎ ── 終わりに近づくほど、声が震える
      const vib = audioCtx.createOscillator(); vib.frequency.value = 3.2 + Math.random();
      const vibG = audioCtx.createGain();
      vibG.gain.setValueAtTime(0, t);
      vibG.gain.linearRampToValueAtTime(f*.022, t+dur*.9);
      vib.connect(vibG); vibG.connect(o.frequency);
      vib.start(t); vib.stop(t+dur+.4);
    } else {
      o.frequency.exponentialRampToValueAtTime(f*.86, t+dur);          // 短い「カア」は軽く落ちるだけ
    }
    const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 760+Math.random()*80; bp.Q.value = .9;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(.0001, t);
    g.gain.linearRampToValueAtTime(baseAmp*(last ? 1 : 1.1), t+(last ? .13 : .04));   // 短い「カア」は立ち上がりを速く、少し強く
    g.gain.setValueAtTime(baseAmp*(last ? 1 : 1.1), t+dur*.4);
    g.gain.exponentialRampToValueAtTime(.0001, t+dur+(last ? .3 : .02));              // 短い声はすぱっと切る ── 三連の輪郭
    o.connect(bp); bp.connect(g); g.connect(distLp);
    g.connect(last ? sendLast : sendShort);
    o.start(t); o.stop(t+dur+.4);
    // ごくかすかな息の出だしだけ ── 荒さではなく、声の始まりの気配として
    const nz = audioCtx.createBufferSource(); nz.buffer = noiseBuf;
    const nbp = audioCtx.createBiquadFilter(); nbp.type = 'bandpass'; nbp.frequency.value = 1000; nbp.Q.value = .7;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(.0001, t);
    ng.gain.linearRampToValueAtTime(.006, t+.03);
    ng.gain.exponentialRampToValueAtTime(.0001, t+.12);
    nz.connect(nbp); nbp.connect(ng); ng.connect(distLp);
    nz.start(t); nz.stop(t+.15);
    t += dur + .36 + Math.random()*.14;                                // 「カア・カア・カアーー」── 声の輪郭が立つ間合い
  }
  // 遠くから、もう一羽がこたえる ── 郷愁はいつも、返事のほうにある（鳴きすぎないよう、控えめに）
  if (!depth && Math.random() < .3) setTimeout(() => { if (ambOn) crowCaw(1); }, (t - t0 + 1.6)*1000);
}
function birdChirps(){       // 小鳥のさえずり（春夏の朝）
  const t0 = audioCtx.currentTime + .05;
  const nCh = 4 + Math.floor(Math.random()*4);
  for (let k = 0; k < nCh; k++){
    const t = t0 + k*(.1 + Math.random()*.1);
    const o = audioCtx.createOscillator(); o.type = 'sine';
    const f = 3100 + Math.random()*900;
    o.frequency.setValueAtTime(f, t);
    o.frequency.linearRampToValueAtTime(f + 800, t+.04);
    o.frequency.linearRampToValueAtTime(f - 300, t+.09);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(.0001, t);
    g.gain.exponentialRampToValueAtTime(.02, t+.014);
    g.gain.exponentialRampToValueAtTime(.0001, t+.11);
    const blp = audioCtx.createBiquadFilter(); blp.type = 'lowpass'; blp.frequency.value = 5200;
    o.connect(blp); blp.connect(g); g.connect(ambBus);
    o.start(t); o.stop(t+.13);
  }
}
function seagull(){          // カモメ（海の街の昼）── 「キィーアォ…」を、遠くの海から
  const t0 = audioCtx.currentTime + .05;
  const nCalls = 1 + Math.floor(Math.random()*3);
  const pan = audioCtx.createStereoPanner(); pan.pan.value = Math.max(-1, Math.min(1, (Math.random()-.5)*1.8));
  const distLp = audioCtx.createBiquadFilter(); distLp.type = 'lowpass'; distLp.frequency.value = 2300;
  distLp.connect(pan); pan.connect(ambBus);
  const send = audioCtx.createGain(); send.gain.value = 1.2;
  distLp.connect(send); send.connect(delaySend);
  for (let k = 0; k < nCalls; k++){
    const t = t0 + k*(.36 + Math.random()*.12);
    const f0 = 980 + Math.random()*180;
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(f0*.7, t);
    o.frequency.linearRampToValueAtTime(f0, t+.09);      // キィ（立ち上がる）
    o.frequency.linearRampToValueAtTime(f0*.5, t+.34);   // ーアォ（尻すぼみに落ちる）
    const vib = audioCtx.createOscillator(); vib.frequency.value = 12 + Math.random()*4;   // 声の震え
    const vibG = audioCtx.createGain(); vibG.gain.value = f0*.028;
    vib.connect(vibG); vibG.connect(o.frequency);
    const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1450; bp.Q.value = 1.3;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(.0001, t);
    g.gain.exponentialRampToValueAtTime(.045, t+.03);
    g.gain.exponentialRampToValueAtTime(.0001, t+.36);
    o.connect(bp); bp.connect(g); g.connect(distLp);
    o.start(t); o.stop(t+.4);
    vib.start(t); vib.stop(t+.4);
    // 息づかいの層 ── 声にざらつきを添える
    const nz = audioCtx.createBufferSource(); nz.buffer = noiseBuf;
    const nbp = audioCtx.createBiquadFilter(); nbp.type = 'bandpass'; nbp.frequency.value = 2000; nbp.Q.value = .7;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(.0001, t);
    ng.gain.exponentialRampToValueAtTime(.01, t+.03);
    ng.gain.exponentialRampToValueAtTime(.0001, t+.3);
    nz.connect(nbp); nbp.connect(ng); ng.connect(distLp);
    nz.start(t); nz.stop(t+.32);
  }
}
function templeBell(delaySec = 0){  // 梵鐘（打撃音・不協和な倍音・うなり・長い余韻）
  const t = audioCtx.currentTime + .05 + delaySec;
  const f0 = 82;
  // 撞木が当たる瞬間の打撃音
  const strike = audioCtx.createBufferSource(); strike.buffer = noiseBuf;
  const sbp = audioCtx.createBiquadFilter(); sbp.type = 'bandpass'; sbp.frequency.value = 900; sbp.Q.value = 1;
  const sg = audioCtx.createGain();
  sg.gain.setValueAtTime(.07, t);
  sg.gain.exponentialRampToValueAtTime(.0001, t+.09);
  strike.connect(sbp); sbp.connect(sg); sg.connect(ambBus);
  strike.start(t); strike.stop(t+.12);
  // 鐘の倍音列（意図的に非整数倍 ── 梵鐘の響き）
  [[1.0,.11,11],[2.02,.06,7],[2.98,.035,5],[4.17,.02,3.5],[5.43,.012,2.5]].forEach(([r, a, dec]) => {
    const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f0*r;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(.0001, t);
    g.gain.exponentialRampToValueAtTime(a, t+.025);
    g.gain.exponentialRampToValueAtTime(.0001, t+dec);
    o.connect(g); g.connect(ambBus); g.connect(delaySend);
    o.start(t); o.stop(t+dec+.2);
  });
  // わずかにずれた双子の基音 ── うなり（ゥワンゥワン…）を生む
  const tw = audioCtx.createOscillator(); tw.type = 'sine'; tw.frequency.value = f0*1.008;
  const tg = audioCtx.createGain();
  tg.gain.setValueAtTime(.0001, t);
  tg.gain.exponentialRampToValueAtTime(.055, t+.03);
  tg.gain.exponentialRampToValueAtTime(.0001, t+10);
  tw.connect(tg); tg.connect(ambBus); tg.connect(delaySend);
  tw.start(t); tw.stop(t+10.2);
}
function semiShaa(){
  const t0 = audioCtx.currentTime + .05;
  const n = 9 + Math.floor(Math.random()*5);          // だんだん強まる間を、しっかり取れるだけの回数に
  const det = .94 + Math.random()*.12;
  const pan = audioCtx.createStereoPanner(); pan.pan.value = (Math.random()-.5)*1.3;
  const bus = audioCtx.createGain(); bus.gain.value = 1;
  bus.connect(pan); pan.connect(ambBus);
  const src = audioCtx.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
  const g = audioCtx.createGain(); g.gain.value = 0;
  src.connect(g);
  const BANDS = [[4400,2.2,1.0],[5600,2.4,.85],[7200,3.0,.5],[9000,3.6,.28]];
  for (const [f,q,gain] of BANDS){
    const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass';
    bp.frequency.value = f*det; bp.Q.value = q;
    const bg = audioCtx.createGain(); bg.gain.value = gain;
    g.connect(bp); bp.connect(bg); bg.connect(bus);
  }
  const trem = audioCtx.createOscillator(); trem.frequency.value = 158 + Math.random()*16;
  const tremG = audioCtx.createGain(); tremG.gain.value = .38;
  trem.connect(tremG); tremG.connect(bus.gain);
  trem.start(t0); src.start(t0);
  const A = .0075;
  let t = t0;
  for (let k = 0; k < n; k++){
    const prog = k/(n-1);                              // 0（鳴き始め）→ 1（いちばん強いところ）
    const swell = .32 + .82*Math.pow(prog, 1.3);        // 対称に弱まらず、しゃーしゃーと強まっていくだけ
    const a = A*swell;
    const gap = .42 - .19*prog;                         // 間隔も、だんだん詰まっていく
    g.gain.setValueAtTime(.0001, t);
    g.gain.linearRampToValueAtTime(a, t+.055+.02*(1-prog));
    g.gain.linearRampToValueAtTime(a*.85, t+.18);
    g.gain.exponentialRampToValueAtTime(.0001, t+.26);
    t += gap;
  }
  src.stop(t+.15); trem.stop(t+.15);
}
function minZemi(){          // ミンミンゼミ（音程のうねり・倍音・息遣いまで）
  const t0 = audioCtx.currentTime + .05;
  const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 4200;
  const bus = audioCtx.createGain(); bus.gain.value = 1;
  lp.connect(bus); bus.connect(ambBus);
  // 主音 ── ひと鳴きごとに音程が沈んで戻る
  const o = audioCtx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(4150, t0);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(.0001, t0);
  g.gain.linearRampToValueAtTime(.0095, t0+.22);        // ミーン
  for (let k = 0; k < 8; k++){                           // ミンミンミン…
    const tp = t0 + .45 + k*(.17 + k*.008);
    g.gain.linearRampToValueAtTime(.0105, tp);
    g.gain.linearRampToValueAtTime(.004, tp+.09);
    o.frequency.setValueAtTime(4150, tp);
    o.frequency.linearRampToValueAtTime(3920, tp+.07);   // 「ミン」ごとに沈む
    o.frequency.linearRampToValueAtTime(4150, tp+.14);
  }
  const tEnd = t0 + .45 + 8*.17 + 8*7*.008;
  g.gain.linearRampToValueAtTime(.006, tEnd+.3);         // ミーーー…（鳴き終わりの持続）
  o.frequency.setValueAtTime(4150, tEnd);
  o.frequency.linearRampToValueAtTime(3600, tEnd+.75);   // 尻すぼみ
  g.gain.linearRampToValueAtTime(.0001, tEnd+.85);
  o.connect(g); g.connect(lp);
  o.start(t0); o.stop(tEnd+1);
  // かすかな倍音 ── 声のつや
  const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 8300;
  const g2 = audioCtx.createGain(); g2.gain.value = 0;
  const fol = audioCtx.createGain(); fol.gain.value = .12;     // 主音の1割強で追従
  g.connect(fol);                                              // エンベロープを共有
  o2.connect(g2); g2.connect(lp);
  g2.gain.setValueAtTime(.0012, t0);
  g2.gain.linearRampToValueAtTime(.0001, tEnd+.85);
  o2.start(t0); o2.stop(tEnd+1);
  // 息遣いのノイズ ── 羽音のようなかすれ
  const br = audioCtx.createBufferSource(); br.buffer = noiseBuf;
  const bbp = audioCtx.createBiquadFilter(); bbp.type = 'bandpass'; bbp.frequency.value = 4300; bbp.Q.value = 3;
  const bg = audioCtx.createGain(); bg.gain.value = .0025;
  br.connect(bbp); bbp.connect(bg); bg.connect(lp);
  bg.gain.setValueAtTime(.0025, t0);
  bg.gain.linearRampToValueAtTime(.0001, tEnd+.85);
  br.start(t0); br.stop(tEnd+1);
}
function kumaZemi(){         // クマゼミ（西日本の朝、シャシャシャシャ…）
  const t0 = audioCtx.currentTime + .05;
  const dur = 1.8 + Math.random()*.8;
  const src = audioCtx.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 6100; bp.Q.value = 2.4;
  const g = audioCtx.createGain(); g.gain.value = 0;
  const gate = audioCtx.createOscillator(); gate.type = 'square'; gate.frequency.value = 11;   // シャ・シャ・シャの刻み
  const gateG = audioCtx.createGain(); gateG.gain.value = .003;
  gate.connect(gateG); gateG.connect(g.gain);
  src.connect(bp); bp.connect(g); g.connect(ambBus);
  g.gain.setValueAtTime(.0001, t0);
  g.gain.linearRampToValueAtTime(.004, t0+.3);
  g.gain.setValueAtTime(.004, t0+dur-.4);
  g.gain.linearRampToValueAtTime(.0001, t0+dur);
  src.start(t0); src.stop(t0+dur+.1);
  gate.start(t0); gate.stop(t0+dur+.1);
}
function higurashi(){        // ヒグラシ（山の方から、かすかに）
  const t0 = audioCtx.currentTime + .05;
  const nK = 12 + Math.floor(Math.random()*6);
  const hlp = audioCtx.createBiquadFilter(); hlp.type = 'lowpass'; hlp.frequency.value = 2900;
  const bus = audioCtx.createGain(); bus.gain.value = .8;
  hlp.connect(bus); bus.connect(ambBus);
  const send = audioCtx.createGain(); send.gain.value = 1.1;
  hlp.connect(send); send.connect(delaySend);
  for (let k = 0; k < nK; k++){
    const t = t0 + k*.118;
    const o = audioCtx.createOscillator(); o.type = 'sine';
    o.frequency.value = 2650*(1 - k*.0045);             // 耳に刺さらない高さで
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(.0001, t);
    g.gain.exponentialRampToValueAtTime(.0072, t+.022);
    g.gain.exponentialRampToValueAtTime(.0001, t+.105);
    o.connect(g); g.connect(hlp);
    o.start(t); o.stop(t+.14);
  }
}
function fiveChime(){        // 夕方のチャイム（黄金の時間に一度だけ）
  const t0 = audioCtx.currentTime + .1;
  [[329.63,0],[261.63,.75],[293.66,1.5],[196.00,2.25]].forEach(([f, dt2]) => {
    const t = t0 + dt2;
    const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(.0001, t);
    g.gain.exponentialRampToValueAtTime(.09, t+.02);
    g.gain.exponentialRampToValueAtTime(.0001, t+2.4);
    o.connect(g); g.connect(ambBus); g.connect(delaySend);
    o.start(t); o.stop(t+2.5);
  });
}
function windChime(){        // 風鈴 ── 江戸風鈴の、澄んで長く尾を引く音
  const t0 = audioCtx.currentTime + .05;
  const nCh = 1 + Math.floor(Math.random()*2);
  for (let k = 0; k < nCh; k++){
    const t = t0 + k*(.4 + Math.random()*.5);
    const f = 2800 + Math.random()*600;
    const amp = k === 0 ? 1 : .55;                       // 二打目はかすかに
    // [倍率, 音量, 減衰] ── 基音は長く、ガラスの打音は一瞬だけ
    [[1.0,  .0024, 4.2],
     [2.76, .001,  .7],
     [1.006,.0013, 3.6]].forEach(([r, a, dec]) => {      // 3本目はわずかにずれ、ゆらぎを生む
      const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f*r;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(.0001, t);
      g.gain.exponentialRampToValueAtTime(a*amp, t+.008);
      g.gain.exponentialRampToValueAtTime(.0001, t+dec);
      o.connect(g); g.connect(ambBus);
      const send = audioCtx.createGain(); send.gain.value = 1.2;   // 余韻はたっぷり
      g.connect(send); send.connect(delaySend);
      o.start(t); o.stop(t+dec+.2);
    });
  }
}

/* --- カメラの視界にあるかどうかの簡易判定（カラスが見えているときに鳴くように） --- */
function cameraForwardVec(){
  return new THREE.Vector3(target.x-camera.position.x, target.y-camera.position.y, target.z-camera.position.z).normalize();
}
function isPointVisible(px, py, pz, marginDeg){
  const fwd = cameraForwardVec();
  const toP = new THREE.Vector3(px-camera.position.x, py-camera.position.y, pz-camera.position.z).normalize();
  const cosA = fwd.dot(toP);
  const halfFov = (camera.fov/2 + (marginDeg||10)) * Math.PI/180;
  return cosA > Math.cos(halfFov);
}
function pickVisibleAngle(heightGuess){
  for (let i = 0; i < 14; i++){
    const ang = Math.random()*Math.PI*2;
    const testR = 380;
    if (isPointVisible(Math.cos(ang)*testR, heightGuess, Math.sin(ang)*testR, 4)) return ang;
  }
  const fwd = cameraForwardVec();                      // 見つからなければ、カメラの正面方向を使う
  return Math.atan2(fwd.z, fwd.x);
}

function startAmbience(){

    const g = audioCtx.createGain(); g.gain.value = 0;

    src.start();
    return {src, g};
  };

  const waveLg = audioCtx.createGain(); waveLg.gain.value = 0;

  rainSrc.start();
